scenario_key: matching-multi-request-oak
purpose: 한 소비자가 활성 요청을 하나씩 취소하며 네 입력을 순차 생성하는 FLOW
schema_version: 2
scenario_type: FLOW
scheduler_type: STABLE
execution_scope:
  - local
  - ci
base_dependencies:
  - db/seed/base/001_reference_data.sql
  - db/seed/base/010_dev_personas.sql
  - db/seed/base/020_instructor_foundations.sql
source:
  spreadsheet: SSING 유저·강사 페르소나 목데이터
  member: members!A10:F10
  requests: matching_requests!A10:L13
  participants: matching_request_participants!A14:E29
personas:
  consumer:
    persona_key: 도파민풀충-나현-일반강습생
    template: GENERAL_CONSUMER
    source_key: member_consumer_007
start_state:
  resort_code: OAK_VALLEY
  exposed_instructor_count: 0
  active_matching_request_count: 0
actions:
  flow: create -> duplicate 409 -> cancel -> next create
  create_path: /api/v1/consumer/matching-requests
  cancel_path: /api/v1/consumer/matching-requests/{matchingRequestId}/cancellation
  payloads:
    - request-007-a.json
    - request-007-b.json
    - request-007-c.json
    - request-007-d.json
expectation:
  request_count: 4
  participant_count: 16
  active_matching_request_count: 1
  canceled_matching_request_count: 3
  matching_status: SEARCHING
  request_status: REQUESTED
  matching_group_count: 0
  matching_offer_count: 0
out_of_scope:
  - key: multi-request-group-payment
    reason: 네 요청은 단일 활성 협상 lifecycle만 검증하며 동시 시작·그룹 결제는 현재 정책 범위가 아니다.
