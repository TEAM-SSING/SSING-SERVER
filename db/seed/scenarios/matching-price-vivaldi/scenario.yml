scenario_key: matching-price-vivaldi
purpose: Vivaldi Park single-request price, payment, and lesson confirmation flow
schema_version: 2
scenario_type: FLOW
scheduler_type: STABLE
execution_scope:
  - local
  - ci
  - dev
base_dependencies:
  - db/seed/base/001_reference_data.sql
  - db/seed/base/010_dev_personas.sql
source:
  spreadsheet: SSING 유저·강사 페르소나 목데이터
  request: matching_requests!A9:L9
  participant: matching_request_participants!A13:F13
  instructor: instructor_profiles!A7:K7
  setting: instructor_matching_settings!A7:K7
  price: instructor_price_policies!A7:G7
personas:
  consumer:
    persona_key: consumer-default
    template: GENERAL_CONSUMER
    source_key: member_consumer_006
  instructor:
    persona_key: instructor-approved-default
    template: INSTRUCTOR_APPROVED
    source_key: member_instructor_004
start_state:
  resort_code: VIVALDI_PARK
  pass_fee_amount: 25000
  active_matching_request_count: 0
action:
  method: POST
  path: /api/v1/consumer/matching-requests
  payload: request.json
expectation:
  initial_matching_status: SEARCHING
  next_matching_status: WAITING_FOR_INSTRUCTOR
  confirmation_status: ACCEPTED
  payment_status: COMPLETED
  final_matching_status: CONFIRMED
  lesson_status: CONFIRMED
  lesson_price_amount: 60000
  resort_pass_fee_amount: 25000
  total_payment_amount: 85000
  platform_fee_amount: 0
persona_review:
  status: REVIEW_REQUIRED
  reason: PM 강사 설명에 아동 전문성 근거가 없어 가격 파이프라인 검증용으로만 사용한다.
deferred_checks:
  - key: instructor-realtime-reconnect-recovery
    status: DEFERRED
    reason: 소비자 복구는 #79에서 검증하고 강사 메인 복구는 별도 작업으로 유지한다.
    tracking:
      - https://github.com/TEAM-SSING/SSING-SERVER/issues/86
    resume_when: 강사 메인 복구 작업을 시작할 때
  - key: scheduler-batch-fairness
    status: DEFERRED
    reason: 이 시나리오는 단일 요청 STABLE 계약만 증명하고 100건 초과 재탐색 공정성은 별도 버그로 관리한다.
    tracking:
      - https://github.com/TEAM-SSING/SSING-SERVER/issues/123
    resume_when: 재탐색 배치 공정성 수정을 시작할 때
out_of_scope:
  - key: multi-request-group-payment
    reason: 다중 요청 그룹의 강습비 분담·반올림 정책은 현재 MVP에서 활성화하지 않는다.
notes:
  - availableDurationMinutes는 시트에 없어 request_006_a의 120분에서 보정했다.
  - MatchingRequest, 가격 snapshot, 결제, 강습은 SQL로 넣지 않고 API와 서버 계산으로 생성한다.
