name: ssing-dev

services:
  # Spring Boot 애플리케이션 컨테이너
  app:
    image: ${SSING_IMAGE}
    container_name: ssing-dev-app
    restart: unless-stopped

    # GitHub Actions가 생성해서 EC2에 업로드하는 런타임 환경변수 파일
    env_file:
      - ${SSING_RUNTIME_ENV_FILE:-.env}

    # 기본 dev 프로필과 JVM 옵션
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JAVA_OPTS: ${JAVA_OPTS:-}

      # Firebase Admin SDK 서비스 계정 키의 컨테이너 내부 경로
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-admin.json

    # Firebase 서비스 계정 키를 읽기 전용으로 마운트
    volumes:
      - /home/ubuntu/ssing/secrets/firebase-admin.json:/run/secrets/firebase-admin.json:ro

    # EC2 내부 헬스체크 전용 포트
    ports:
      - "127.0.0.1:8080:8080"

    # Caddy와 애플리케이션 간 내부 통신 네트워크
    networks:
      - ssing-dev

  # dev DB를 원본 표 형태로 확인하는 개발자 도구
  # 기존 runtime admin 계정으로 자동 로그인하므로 dev 환경에서만 실행한다.
  adminer:
    image: adminer:5.4.2-standalone
    container_name: ssing-dev-adminer
    restart: unless-stopped

    # 실제 비밀번호는 환경변수 대신 /run/secrets 파일에서만 읽는다.
    environment:
      ADMINER_DEFAULT_SERVER: ${SSING_ADMINER_DEFAULT_SERVER}
      SSING_ADMINER_DB_SERVER: ${SSING_ADMINER_DEFAULT_SERVER}
      SSING_ADMINER_DB_USERNAME: ${SSING_DATASOURCE_USERNAME}
      SSING_ADMINER_DB_NAME: ${SSING_DEV_DB_NAME:?SSING_DEV_DB_NAME is required}
      SSING_ADMINER_DB_PASSWORD_FILE: /run/secrets/adminer_db_password

    volumes:
      - ./adminer/001-ssing-autologin.php:/var/www/html/plugins-enabled/001-ssing-autologin.php:ro

    secrets:
      - adminer_db_password

    # host port를 열지 않고 Caddy를 통해서만 접근한다.
    networks:
      - ssing-dev

  # HTTPS 종료와 reverse proxy 컨테이너
  caddy:
    image: caddy:2.10-alpine
    container_name: ssing-dev-caddy
    restart: unless-stopped

    # 애플리케이션 컨테이너 우선 생성 순서
    depends_on:
      - app
      - adminer

    # Caddyfile 도메인 치환 값
    environment:
      SSING_DEV_DOMAIN: ${SSING_DEV_DOMAIN}

    # 외부 HTTP/HTTPS 진입 포트
    ports:
      - "80:80"
      - "443:443"

    # Caddy 설정 파일과 인증서/설정 영속 볼륨
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ssing-dev-caddy-data:/data
      - ssing-dev-caddy-config:/config

    # 애플리케이션 컨테이너 접근 네트워크
    networks:
      - ssing-dev

# Adminer에만 전달하는 기존 dev runtime DB 비밀번호
secrets:
  adminer_db_password:
    file: ./secrets/adminer-db-password

# dev 배포 전용 Docker 네트워크
networks:
  ssing-dev:
    name: ssing-dev

# Caddy 인증서와 내부 설정 보존 볼륨
volumes:
  ssing-dev-caddy-data:
  ssing-dev-caddy-config:
