spring:
  application:
    name: ssing-server
  profiles:
    default: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

ssing:
  dev-matching-actions:
    # 조회 화면은 유지하되, 실제 매칭 상태 변경 API는 명시적으로 켠 local/dev에서만 만든다.
    enabled: ${SSING_DEV_MATCHING_ACTIONS_ENABLED:false}
  dev-instructor-actions:
    # local/dev 프로필이어도 명시적으로 켜지 않으면 실제 Kakao 회원 변경 API를 만들지 않는다.
    enabled: ${SSING_DEV_INSTRUCTOR_ACTIONS_ENABLED:false}
  auth:
    jwt:
      issuer: ssing
      secret: ${SSING_JWT_SECRET:}
      access-token-expiration: PT1H
    refresh-token:
      expiration: P14D
    kakao:
      base-url: https://kapi.kakao.com
      app-id: ${SSING_KAKAO_APP_ID:}
      connect-timeout: PT2S
      read-timeout: PT3S
  realtime:
    websocket:
      # TODO: 운영/배포 전 SSING_REALTIME_WEBSOCKET_ALLOWED_ORIGINS를 실제 허용 origin으로 제한한다.
      allowed-origins: ${SSING_REALTIME_WEBSOCKET_ALLOWED_ORIGINS:*}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
