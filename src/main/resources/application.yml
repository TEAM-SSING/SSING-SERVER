spring:
  application:
    name: ssing-server
  profiles:
    default: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

ssing:
  auth:
    jwt:
      issuer: ssing
      secret: ${SSING_JWT_SECRET:}
      access-token-expiration: PT1H
    refresh-token:
      expiration: P14D
    kakao:
      base-url: https://kapi.kakao.com
      app-id: ${SSING_KAKAO_APP_ID:}
      connect-timeout: PT2S
      read-timeout: PT3S
  realtime:
    websocket:
      # TODO: 운영/배포 전 SSING_REALTIME_WEBSOCKET_ALLOWED_ORIGINS를 실제 허용 origin으로 제한한다.
      allowed-origins: ${SSING_REALTIME_WEBSOCKET_ALLOWED_ORIGINS:*}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
