server:
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${SSING_DATASOURCE_URL}
    username: ${SSING_DATASOURCE_USERNAME}
    password: ${SSING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SSING_JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:dev}
  release: ${SENTRY_RELEASE:}
  send-default-pii: false
  max-request-body-size: none
  sample-rate: ${SENTRY_SAMPLE_RATE:1.0}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
