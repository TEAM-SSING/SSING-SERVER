spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ssing?serverTimezone=UTC&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: ${LOCAL_DB_USERNAME:root}
    password: ${LOCAL_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
