<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SSING Dev Auth Console</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f141b;
            --surface: #151b23;
            --surface-raised: #1b2330;
            --line: #2b3442;
            --text: #eef2f7;
            --muted: #9aa4b2;
            --primary: #7aa2ff;
            --primary-dark: #5d87f0;
            --primary-soft: rgba(122, 162, 255, 0.14);
            --brand-blue: #2C8BEF;
            --mint: #8ee8d8;
            --coral: #ffb199;
            --sun: #f7d77a;
            --snow: #dff6ff;
            --danger: #ff8a80;
            --success: #63d297;
            --warning: #f5c56b;
            --font-size-micro: 0.75rem;
            --font-size-caption: 0.8125rem;
            --font-size-body: 0.875rem;
            --font-size-body-lg: 1rem;
            --font-size-title-sm: 1.125rem;
            --font-size-title-md: 1.375rem;
            --line-height-micro: 1rem;
            --line-height-caption: 1.125rem;
            --line-height-body: 1.25rem;
            --line-height-body-lg: 1.5rem;
            --line-height-title-sm: 1.5rem;
            --line-height-title-md: 1.75rem;
            --font-weight-regular: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
            --type-page-title-size: var(--font-size-title-md);
            --type-page-title-line: var(--line-height-title-md);
            --type-modal-title-size: var(--font-size-title-sm);
            --type-modal-title-line: var(--line-height-title-sm);
            --type-body-size: var(--font-size-body);
            --type-body-line: var(--line-height-body);
            --type-control-size: var(--font-size-body);
            --type-control-line: var(--line-height-body);
            --type-caption-size: var(--font-size-caption);
            --type-caption-line: var(--line-height-caption);
            --type-micro-size: var(--font-size-micro);
            --type-micro-line: var(--line-height-micro);
            --persona-grid-columns: minmax(180px, 1.1fr) minmax(128px, 0.8fr) minmax(110px, 120px) minmax(58px, 72px) minmax(76px, 92px) minmax(82px, 96px) minmax(112px, 126px) minmax(64px, 72px);
            --persona-grid-gap: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background:
                linear-gradient(180deg, rgba(16, 24, 35, 0.96) 0%, rgba(12, 18, 26, 0.98) 58%, #0a0f15 100%),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: var(--type-body-size);
            line-height: var(--type-body-line);
            letter-spacing: 0;
            -webkit-font-smoothing: antialiased;
        }

        .snowfield-backdrop {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            --ill-snow: #f8fbff;
            --ill-ice: #e7f3ff;
            --ill-mist: #d8eaf7;
            --ill-frost: #bfd7ea;
            --ill-slate: #334155;
            --ill-soft-navy: #1e3a5f;
            --ill-penguin: #2f3a4a;
            --ill-bear: #f5f8fa;
            --ill-seal: #c8d3dc;
            --ill-accent-sky: #7db7d9;
            --ill-accent-mint: #a8dad6;
            --ill-accent-blush: #ffb4a2;
            --ill-accent-sun: #ffd166;
        }

        .snowfield-backdrop svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0.5;
        }

        .snowfield-backdrop .backdrop-hill {
            fill: rgba(231, 243, 255, 0.055);
        }

        .snowfield-backdrop .backdrop-track {
            fill: none;
            stroke: rgba(191, 215, 234, 0.13);
            stroke-width: 2.2;
            stroke-linecap: round;
        }

        .snowfield-backdrop .backdrop-dot {
            fill: rgba(248, 251, 255, 0.13);
        }

        .snowfield-backdrop .backdrop-playmate {
            opacity: 0.1;
        }

        .snowfield-backdrop .backdrop-primary {
            opacity: 0.14;
        }

        .snowfield-backdrop .backdrop-faint {
            opacity: 0.075;
        }

        button,
        input,
        textarea,
        select {
            font: inherit;
        }

        header {
            display: flex;
            position: relative;
            z-index: 1;
            align-items: center;
            justify-content: flex-start;
            gap: 16px;
            padding: 24px;
            border-bottom: 1px solid var(--line);
            background: rgba(21, 27, 35, 0.84);
            backdrop-filter: blur(16px);
        }

        .brand-lockup {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .ssing-brand {
            display: block;
            flex: 0 0 auto;
            width: 38px;
            height: 29px;
            color: var(--brand-blue);
        }

        .ssing-brand path {
            fill: currentColor;
        }

        h1 {
            margin: 0;
            font-size: var(--type-page-title-size);
            line-height: var(--type-page-title-line);
            font-weight: var(--font-weight-bold);
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px;
        }

        .console-panel {
            padding: 16px;
            border: 1px solid rgba(151, 175, 203, 0.32);
            border-radius: 12px;
            background: rgba(14, 20, 29, 0.92);
            box-shadow: 0 18px 64px rgba(4, 9, 15, 0.28);
            backdrop-filter: blur(14px);
        }

        .button {
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            padding: 8px 14px;
            font-size: var(--type-control-size);
            line-height: var(--type-control-line);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
        }

        .button:hover {
            border-color: #3d4a5c;
            background: var(--surface-raised);
        }

        .button.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: #09111f;
            font-weight: var(--font-weight-bold);
        }

        .button.primary:hover {
            background: var(--primary-dark);
        }

        .button.copied {
            border-color: rgba(99, 210, 151, 0.42);
            color: var(--success);
            background: rgba(99, 210, 151, 0.08);
        }

        .icon-button {
            display: inline-grid;
            place-items: center;
            width: 36px;
            min-width: 36px;
            min-height: 36px;
            border-radius: 8px;
            padding: 0;
            color: var(--muted);
        }

        .icon-button svg {
            width: 18px;
            height: 18px;
        }

        .modal-close {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
        }

        .modal-close:hover {
            color: var(--text);
        }

        .refresh-button {
            width: 40px;
            min-width: 40px;
            min-height: 40px;
        }

        .button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .button:focus-visible,
        .choice:focus-visible,
        .sort-header:focus-visible,
        input:focus-visible,
        textarea:focus-visible,
        select:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .toolbar-actions {
            grid-area: actions;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            grid-template-areas:
                "controls actions"
                "meta meta";
            align-items: center;
            column-gap: 16px;
            row-gap: 10px;
            margin-bottom: 16px;
        }

        .toolbar-meta {
            grid-area: meta;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-width: 0;
        }

        .toolbar-controls {
            grid-area: controls;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .toolbar-create {
            min-width: 82px;
        }

        .status {
            min-height: 18px;
            color: var(--muted);
            font-size: var(--type-caption-size);
            line-height: var(--type-caption-line);
            text-align: right;
        }

        .summary {
            color: var(--muted);
            font-size: var(--type-caption-size);
            line-height: var(--type-caption-line);
            min-width: 0;
        }

        .status.success {
            color: var(--success);
        }

        .status.error {
            color: var(--danger);
        }

        .status.warning {
            color: var(--warning);
        }

        .persona-list {
            container-name: persona-list;
            container-type: inline-size;
            display: grid;
            gap: 10px;
        }

        .persona-list-header,
        .persona-main {
            display: grid;
            grid-template-columns: var(--persona-grid-columns);
            align-items: center;
            column-gap: var(--persona-grid-gap);
        }

        .persona-list-header {
            padding: 0 17px 4px;
            color: var(--muted);
            font-size: var(--type-micro-size);
            line-height: var(--type-micro-line);
            font-weight: var(--font-weight-semibold);
        }

        .persona-list-header > *,
        .persona-main > * {
            min-width: 0;
        }

        .persona-identity,
        .persona-meta-grid {
            display: contents;
        }

        .persona-identity > *,
        .persona-meta-grid > * {
            min-width: 0;
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 24px;
            min-width: 0;
            text-align: center;
            white-space: nowrap;
        }

        .column-header:first-child,
        .column-header:nth-child(2) {
            justify-content: flex-start;
            text-align: left;
        }

        .sort-header {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 100%;
            min-height: 24px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: inherit;
            padding: 0;
            font: inherit;
            font-weight: inherit;
            cursor: pointer;
        }

        .column-header:first-child .sort-header,
        .column-header:nth-child(2) .sort-header {
            justify-content: flex-start;
        }

        .sort-header:hover,
        .sort-header.active {
            color: var(--text);
        }

        .sort-arrow {
            display: inline-block;
            width: 10px;
            color: var(--primary);
            text-align: center;
        }

        .sort-header:not(.active) .sort-arrow {
            opacity: 0;
        }

        .persona-row {
            container-name: persona-row;
            container-type: inline-size;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            overflow: hidden;
        }

        .persona-main {
            padding: 14px 16px;
        }

        .persona-main > .button {
            justify-self: stretch;
            min-width: 0;
            padding-inline: 10px;
        }

        .persona-key {
            font-size: var(--type-body-size);
            line-height: var(--type-body-line);
            font-weight: var(--font-weight-bold);
            overflow-wrap: anywhere;
        }

        .nickname {
            color: #cdd6e4;
            font-size: var(--type-body-size);
            line-height: var(--type-body-line);
            font-weight: var(--font-weight-medium);
            overflow-wrap: anywhere;
        }

        .field-label-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .label-meta {
            color: #b5c0cf;
            font-size: var(--type-micro-size);
            line-height: var(--type-micro-line);
            font-weight: var(--font-weight-bold);
            white-space: nowrap;
        }

        .cell {
            color: var(--muted);
            font-size: var(--type-body-size);
            line-height: var(--type-body-line);
            white-space: nowrap;
        }

        .data-cell {
            justify-self: center;
            text-align: center;
            color: #b8c2d0;
            font-size: var(--type-body-size);
            line-height: var(--type-body-line);
            font-weight: var(--font-weight-medium);
            white-space: nowrap;
        }

        .strong-cell {
            justify-self: start;
            text-align: left;
            color: #dce5f0;
            font-weight: var(--font-weight-bold);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .created-at-cell {
            color: #aeb8c6;
        }

        .empty-cell {
            grid-column: 1 / -1;
        }

        .meta-cell {
            display: grid;
            justify-self: center;
            gap: 2px;
            text-align: center;
            white-space: nowrap;
        }

        .meta-cell span {
            color: var(--muted);
            font-size: var(--type-micro-size);
            line-height: var(--type-micro-line);
            font-weight: var(--font-weight-semibold);
        }

        .meta-cell strong {
            color: var(--text);
            font-size: var(--type-caption-size);
            line-height: var(--type-caption-line);
            font-weight: var(--font-weight-semibold);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-self: center;
            max-width: 100%;
            min-height: 26px;
            border: 1px solid var(--badge-border, transparent);
            border-radius: 999px;
            background: var(--badge-bg, var(--primary-soft));
            color: var(--badge-text, var(--primary));
            padding: 3px 9px;
            font-size: var(--type-caption-size);
            line-height: var(--type-caption-line);
            font-weight: var(--font-weight-semibold);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .template-badge--consumer-positive {
            --badge-bg: rgba(142, 232, 216, 0.13);
            --badge-border: rgba(142, 232, 216, 0.32);
            --badge-text: #9ff0e1;
        }

        .template-badge--consumer-negative {
            --badge-bg: rgba(255, 177, 153, 0.12);
            --badge-border: rgba(255, 177, 153, 0.34);
            --badge-text: #ffc0ad;
        }

        .template-badge--instructor-pending {
            --badge-bg: rgba(247, 215, 122, 0.12);
            --badge-border: rgba(247, 215, 122, 0.32);
            --badge-text: #f6d982;
        }

        .template-badge--instructor-positive {
            --badge-bg: linear-gradient(135deg, rgba(142, 232, 216, 0.11), rgba(122, 162, 255, 0.11));
            --badge-border: rgba(122, 162, 255, 0.34);
            --badge-text: #b9e7e6;
        }

        .template-badge--neutral {
            --badge-bg: rgba(154, 164, 178, 0.12);
            --badge-border: rgba(154, 164, 178, 0.28);
            --badge-text: #c6ced8;
        }

        .token-panel {
            display: grid;
            gap: 10px;
            padding: 14px 16px 16px;
            border-top: 1px solid var(--line);
            background: var(--surface-raised);
        }

        .token-panel[hidden] {
            display: none;
        }

        .token-field {
            display: grid;
            grid-template-columns: 120px 1fr auto;
            align-items: start;
            gap: 10px;
        }

        .token-field label {
            padding-top: 8px;
            color: var(--muted);
            font-size: var(--type-body-size);
            line-height: var(--type-body-line);
            font-weight: var(--font-weight-semibold);
        }

        .token-field .button {
            min-width: 82px;
        }

        .modal .token-panel {
            gap: 6px;
            padding: 8px 10px 10px;
        }

        .modal .token-field {
            grid-template-columns: 104px 1fr auto;
            gap: 8px;
        }

        .modal .token-field label {
            padding-top: 6px;
            font-size: var(--type-caption-size);
            line-height: var(--type-caption-line);
        }

        .modal .token-field textarea {
            min-height: 40px;
            padding: 7px 8px;
        }

        textarea {
            width: 100%;
            min-height: 70px;
            resize: vertical;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            color: var(--text);
            background: #0f141b;
        }

        dialog {
            width: min(760px, calc(100vw - 32px));
            border: 0;
            border-radius: 8px;
            padding: 0;
            box-shadow: 0 24px 64px rgba(15, 23, 42, 0.24);
            background: transparent;
            color: var(--text);
        }

        dialog::backdrop {
            background: rgba(5, 10, 18, 0.72);
        }

        .modal {
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background:
                linear-gradient(145deg, rgba(142, 232, 216, 0.08), transparent 34%),
                linear-gradient(315deg, rgba(255, 177, 153, 0.08), transparent 36%),
                var(--surface);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .modal-title {
            margin: 0;
            font-size: var(--type-modal-title-size);
            line-height: var(--type-modal-title-line);
            font-weight: var(--font-weight-semibold);
        }

        .form-grid {
            display: grid;
            gap: 9px;
        }

        #modalTokenPanel:empty,
        #modalStatus:empty {
            display: none;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field[hidden] {
            display: none;
        }

        .field label {
            color: var(--muted);
            font-size: var(--type-caption-size);
            line-height: var(--type-caption-line);
            font-weight: var(--font-weight-semibold);
        }

        .field-help {
            margin: -2px 0 0;
            color: var(--muted);
            font-size: var(--type-caption-size);
            line-height: var(--type-caption-line);
        }

        .field-help-inline {
            margin-left: auto;
            min-width: 0;
            overflow: hidden;
            color: var(--muted);
            font-size: var(--type-micro-size);
            line-height: var(--type-micro-line);
            font-weight: var(--font-weight-medium);
            text-align: right;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        input {
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            color: var(--text);
            background: #0f141b;
            font-size: var(--type-control-size);
            line-height: var(--type-control-line);
        }

        select {
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 34px 8px 10px;
            color: var(--text);
            background: var(--surface);
            font-size: var(--type-control-size);
            line-height: var(--type-control-line);
        }

        .choice-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        #roleChoices {
            gap: 12px;
        }

        #templateChoices {
            gap: 10px;
        }

        .choice {
            position: relative;
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 12px;
            min-height: 96px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.028), rgba(255, 255, 255, 0.008)),
                var(--surface);
            color: var(--text);
            padding: 14px;
            font-size: var(--type-control-size);
            line-height: var(--type-control-line);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
            text-align: left;
            overflow: hidden;
            transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease, transform 140ms ease;
        }

        .choice:hover {
            border-color: rgba(122, 162, 255, 0.54);
            transform: translateY(-1px);
        }

        .choice:focus-visible {
            outline: 2px solid rgba(122, 162, 255, 0.72);
            outline-offset: 2px;
        }

        .choice.selected {
            border-color: var(--primary);
            background:
                linear-gradient(135deg, rgba(122, 162, 255, 0.16), rgba(142, 232, 216, 0.06)),
                var(--surface-raised);
            color: var(--primary);
            font-weight: var(--font-weight-bold);
            box-shadow: inset 0 0 0 1px rgba(122, 162, 255, 0.28);
        }

        .role-card {
            grid-template-columns: 1fr;
            justify-items: center;
            align-content: center;
            gap: 6px;
            min-height: 132px;
            padding: 10px;
            text-align: center;
        }

        .status-card {
            min-height: 94px;
        }

        .choice-visual {
            position: relative;
            display: grid;
            place-items: center;
            width: 96px;
            height: 76px;
            border-radius: 999px;
            background: radial-gradient(circle at 50% 42%, rgba(248, 251, 255, 0.16), rgba(206, 218, 229, 0.08) 58%, rgba(125, 183, 217, 0.03) 78%, transparent 82%);
            overflow: visible;
        }

        .role-card .choice-visual {
            width: min(80px, 100%);
            height: 60px;
            border-radius: 0;
            background: transparent;
            overflow: visible;
        }

        .role-card .choice-visual::before {
            position: absolute;
            inset: 4% -8% -8%;
            border-radius: 999px;
            background: radial-gradient(circle at 50% 45%, rgba(248, 251, 255, 0.24), rgba(214, 224, 234, 0.15) 58%, rgba(125, 183, 217, 0.04) 78%, transparent 84%);
            content: "";
        }

        .role-card .choice-svg {
            transform: scale(1.22);
            transform-origin: center;
        }

        .status-card .choice-visual {
            width: 60px;
            height: 48px;
        }

        .status-card .choice-svg {
            transform: scale(1.22);
            transform-origin: center;
        }

        .illustration-symbols {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
        }

        .choice-svg {
            position: relative;
            z-index: 1;
            display: block;
            width: 100%;
            height: 100%;
            --ill-snow: #f8fbff;
            --ill-ice: #e7f3ff;
            --ill-mist: #d8eaf7;
            --ill-frost: #bfd7ea;

            display: grid;
            gap: 4px;
            min-width: 0;
        }

        .role-card .choice-body {

            gap: 7px;

        .choice-title {
            color: var(--text);
            font-size: 15px;

            top: 10px;
            right: 10px;

            place-items: center;
            width: 22px;
            height: 22px;
            border-radius: 999px;
            background: rgba(122, 162, 255, 0.2);
            color: var(--primary);
            opacity: 0;
            transform: scale(0.86);
            transition: opacity 140ms ease, transform 140ms ease;

        .choice.selected .choice-check {

            transform: scale(1);

        .choice-check svg {
            width: 16px;
            height: 16px;
        }

        .segmented {

            gap: 2px;
            padding: 3px;

            border-radius: 8px;
            background: #111821;

            border-radius: 6px;

            font-weight: var(--font-weight-medium);

        .segmented button.selected {

            color: var(--text);

            gap: 8px;
            margin-top: 10px;

                padding: 14px var(--persona-row-pad-x);
            }

            .persona-main > .button {
                justify-self: stretch;
            }

            .persona-identity {
                grid-area: identity;
                display: grid;
                align-content: start;
                gap: 2px;
                min-width: 0;
                padding-right: var(--persona-identity-pad-right);
            }

            .persona-meta-grid {
                grid-area: meta;
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px 10px;
                min-width: 0;
            }

            .persona-main > .token-action {
                grid-area: token-action;
                align-self: start;
                justify-self: end;
                width: var(--persona-action-width);
                min-width: 0;
                max-width: var(--persona-action-width);
                padding-inline: 10px;
            }

            .persona-key,
            .nickname {
                justify-self: start;
                text-align: left;
                white-space: normal;
            }

            .strong-cell {
                overflow: visible;
                text-overflow: clip;
            }

            .persona-main [data-label] {
                display: flex;
                align-items: center;
                justify-content: space-between;
                justify-self: stretch;
                gap: 8px;
                min-width: 0;
                min-height: 32px;

                border-radius: 8px;
                padding: 6px 8px;
                text-align: right;
                white-space: normal;

                flex: 0 0 auto;
                color: var(--muted);
                font-size: var(--type-micro-size);
                line-height: var(--type-micro-line);
                font-weight: var(--font-weight-semibold);
                content: attr(data-label);
            }

            .persona-main .template-cell {
                grid-column: 1 / -1;
                max-width: none;
            }

            .empty-cell {
                grid-column: 1 / -1;
            }
        }

            .token-field {

<script>
    const templatesByRole = {
        consumer: [
            ["GENERAL_CONSUMER", "일반 강습생"],
            ["SUSPENDED_CONSUMER", "정지된 강습생"]
        ],
        instructor: [
            ["INSTRUCTOR_PENDING", "심사 중 강사"],
            ["INSTRUCTOR_APPROVED", "승인된 강사"]
        ]
    };

    const roleOptions = [
        {
            value: "consumer",
            title: "강습생",
            description: "수업을 신청하고 강습생 토큰을 받는 사용자"
        },
        {
            value: "instructor",
            title: "강사",
            description: "수업을 관리하고 강사 권한 토큰을 받는 사용자"
        }
    ];
    const templateDescriptions = {
        GENERAL_CONSUMER: "가입 완료 상태로 바로 토큰 테스트",
        SUSPENDED_CONSUMER: "정지 회원 제한 흐름 확인",
        INSTRUCTOR_PENDING: "승인 전 제한 흐름 확인",
        INSTRUCTOR_APPROVED: "강사 권한 흐름 바로 확인"
    };
    const roleArtwork = {
        consumer: createSvgArtwork("illustration-student", "student-svg"),
        instructor: createSvgArtwork("illustration-instructor", "instructor-svg")
    };
    const statusArtwork = {
        GENERAL_CONSUMER: createSvgArtwork("illustration-student", "status-active-svg"),
        SUSPENDED_CONSUMER: createSvgArtwork("illustration-student-suspended", "status-suspended-svg"),
        INSTRUCTOR_PENDING: createSvgArtwork("illustration-instructor-pending", "status-pending-svg"),
        INSTRUCTOR_APPROVED: createSvgArtwork("illustration-instructor-approved", "status-approved-svg")
    };
    const templateBadgeClasses = {
        GENERAL_CONSUMER: "template-badge--consumer-positive",
        SUSPENDED_CONSUMER: "template-badge--consumer-negative",
        INSTRUCTOR_PENDING: "template-badge--instructor-pending",
        INSTRUCTOR_APPROVED: "template-badge--instructor-positive"
    };

    const templateLabels = Object.values(templatesByRole)
        .flat()
        .reduce((labels, [value, label]) => ({...labels, [value]: label}), {});
    const roleLabels = {
        CONSUMER: "강습생",
        INSTRUCTOR: "강사"
    };
    const memberStatusLabels = {
        ACTIVE: "활성 회원",
        SUSPENDED: "정지 회원"
    };
    const instructorStatusLabels = {
        NONE: "해당 없음",
        PENDING: "심사 중",
        APPROVED: "승인 완료",
        REJECTED: "반려",
        SUSPENDED: "정지"
    };
    const createdAtFormatter = new Intl.DateTimeFormat("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
    });
    const defaultSortDirections = {
        personaKey: "asc",
        nickname: "asc",
        template: "asc",
        role: "asc",
        memberStatus: "asc",
        instructorStatus: "asc",
        createdAt: "desc"
    };
    const sortDirectionLabels = {
        asc: "오름차순",
        desc: "내림차순"
    };

    const state = {
        personas: [],
        issuedTokensByPersonaKey: new Map(),
        expandedTokenPanelKeys: new Set(),
        roleFilter: "all",
        sortKey: "createdAt",
        sortDirection: "desc",
        isCreating: false,
        createCompleted: false,
        selectedRole: null,
        selectedTemplate: null
    };

    const status = document.querySelector("#status");
    const summary = document.querySelector("#summary");
    const modalStatus = document.querySelector("#modalStatus");
    const personaList = document.querySelector("#personaList");
    const dialog = document.querySelector("#createDialog");
    const createForm = document.querySelector("#createForm");
    const createButton = document.querySelector("#createPersonaButton");
    const roleChoices = document.querySelector("#roleChoices");
    const templateField = document.querySelector("#templateField");
    const templateChoices = document.querySelector("#templateChoices");
    const modalTokenPanel = document.querySelector("#modalTokenPanel");

    renderRoleChoices();

    document.querySelector("#openCreateModal").addEventListener("click", () => {
        resetCreateForm();
        dialog.showModal();
    });
    document.querySelector("#closeCreateModal").addEventListener("click", () => dialog.close());
    document.querySelector("#refreshPersonas").addEventListener("click", loadPersonas);

    roleChoices.addEventListener("click", event => {
        const button = event.target.closest("[data-role-choice]");
        if (button) {
            selectRole(button.dataset.roleChoice);
        }
    });
    roleChoices.addEventListener("keydown", event => {
        handleChoiceKeydown(event, "[data-role-choice]", button => selectRole(button.dataset.roleChoice));
    });
    templateChoices.addEventListener("keydown", event => {
        handleChoiceKeydown(event, "[data-template-choice]", selectTemplate);
    });

    document.querySelectorAll("[data-role-filter]").forEach(button => {
        button.addEventListener("click", () => selectRoleFilter(button.dataset.roleFilter));
    });

    createForm.addEventListener("input", syncCreateButton);
    createForm.addEventListener("submit", async event => {
        event.preventDefault();
        await createPersona();
    });

    async function loadPersonas() {
        setStatus(status, "불러오는 중", "");
        try {
            const response = await requestJson("/dev/auth/personas");
            state.personas = response.data.personas;
            renderPersonas();
            setStatus(status, "", "");
        } catch (error) {
            updateSummary([]);
            setStatus(status, error.message, "error");
        }
    }

    function renderPersonas() {
        const visiblePersonas = getVisiblePersonas();
        updateSummary(visiblePersonas);
        personaList.replaceChildren();
        if (visiblePersonas.length === 0) {
            const empty = document.createElement("div");
            empty.className = "persona-row";
            const message = state.personas.length === 0
                ? "생성된 유저가 없습니다."
                : "필터에 맞는 유저가 없습니다.";
            empty.innerHTML = `<div class="persona-main"><span class="cell empty-cell">${message}</span></div>`;
            personaList.append(empty);
            return;
        }

        personaList.append(createPersonaListHeader());
        visiblePersonas.forEach(persona => {
            const templateLabel = formatTemplate(persona.template);
            const roleLabel = formatRole(persona.role);
            const memberStatusLabel = formatMemberStatus(persona.memberStatus);
            const instructorStatusLabel = formatInstructorStatus(persona.instructorStatus);
            const createdAtLabel = formatCreatedAt(persona.createdAt);
            const row = document.createElement("article");
            row.className = "persona-row";
            row.innerHTML = `
                <div class="persona-main">
                    <div class="persona-identity">
                        <span class="persona-key data-cell strong-cell">${escapeHtml(persona.personaKey)}</span>
                        <span class="nickname data-cell strong-cell">${escapeHtml(persona.nickname)}</span>
                    </div>
                    <div class="persona-meta-grid">
                        <span class="badge template-badge template-cell ${templateBadgeClass(persona.template)}" data-label="상태" aria-label="상태: ${escapeHtml(templateLabel)}">${escapeHtml(templateLabel)}</span>
                        <span class="data-cell role-cell" data-label="구분" aria-label="구분: ${escapeHtml(roleLabel)}">${escapeHtml(roleLabel)}</span>
                        <span class="data-cell member-status-cell" data-label="회원 상태" aria-label="회원 상태: ${escapeHtml(memberStatusLabel)}">${escapeHtml(memberStatusLabel)}</span>
                        <span class="data-cell instructor-status-cell" data-label="강사 승인" aria-label="강사 승인: ${escapeHtml(instructorStatusLabel)}">${escapeHtml(instructorStatusLabel)}</span>
                        <span class="data-cell created-at-cell" data-label="생성 일시" aria-label="생성 일시: ${escapeHtml(createdAtLabel)}">${escapeHtml(createdAtLabel)}</span>
                    </div>
                    <button class="button primary token-action" type="button" data-issue-token data-toggle-token-panel="false" aria-label="${escapeHtml(persona.personaKey)} 토큰 발급">발급</button>
                </div>
                <div class="token-panel" hidden></div>
            `;
            row.querySelector("[data-issue-token]").addEventListener("click", () => issueTokenForRow(persona, row));
            const issuedToken = state.issuedTokensByPersonaKey.get(persona.personaKey);
            if (issuedToken) {
                const collapsed = !state.expandedTokenPanelKeys.has(persona.personaKey);
                renderTokenPanel(row.querySelector(".token-panel"), issuedToken, collapsed);
                syncTokenButtonState(row, persona);
            }
            personaList.append(row);
        });
    }

    function createPersonaListHeader() {
        const header = document.createElement("div");
        header.className = "persona-list-header";
        header.setAttribute("role", "row");
        header.innerHTML = `
            <span class="column-header" role="columnheader" aria-sort="none" data-sort-cell="personaKey">
                <button class="sort-header" type="button" data-sort-key="personaKey">
                    <span>페르소나</span>
                    <span class="sort-arrow" aria-hidden="true"></span>
                </button>
            </span>
            <span class="column-header" role="columnheader" aria-sort="none" data-sort-cell="nickname">
                <button class="sort-header" type="button" data-sort-key="nickname">
                    <span>닉네임</span>
                    <span class="sort-arrow" aria-hidden="true"></span>
                </button>
            </span>
            <span class="column-header" role="columnheader" aria-sort="none" data-sort-cell="template">
                <button class="sort-header" type="button" data-sort-key="template">
                    <span>상태 템플릿</span>
                    <span class="sort-arrow" aria-hidden="true"></span>
                </button>
            </span>
            <span class="column-header" role="columnheader" aria-sort="none" data-sort-cell="role">
                <button class="sort-header" type="button" data-sort-key="role">
                    <span>구분</span>
                    <span class="sort-arrow" aria-hidden="true"></span>
                </button>
            </span>
            <span class="column-header" role="columnheader" aria-sort="none" data-sort-cell="memberStatus">
                <button class="sort-header" type="button" data-sort-key="memberStatus">
                    <span>회원 상태</span>
                    <span class="sort-arrow" aria-hidden="true"></span>
                </button>
            </span>
            <span class="column-header" role="columnheader" aria-sort="none" data-sort-cell="instructorStatus">
                <button class="sort-header" type="button" data-sort-key="instructorStatus">
                    <span>강사 승인</span>
                    <span class="sort-arrow" aria-hidden="true"></span>
                </button>
            </span>
            <span class="column-header" role="columnheader" aria-sort="none" data-sort-cell="createdAt">
                <button class="sort-header" type="button" data-sort-key="createdAt">
                    <span>생성 일시</span>
                    <span class="sort-arrow" aria-hidden="true"></span>
                </button>
            </span>
            <span class="column-header token-column-header" role="columnheader">토큰</span>
        `;
        header.querySelectorAll("[data-sort-key]").forEach(button => {
            syncSortHeader(button);
            button.addEventListener("click", () => selectSortColumn(button.dataset.sortKey));
        });
        return header;
    }

    function selectSortColumn(sortKey) {
        if (state.sortKey === sortKey) {
            state.sortDirection = state.sortDirection === "asc" ? "desc" : "asc";
        } else {
            state.sortKey = sortKey;
            state.sortDirection = defaultSortDirections[sortKey] || "asc";
        }
        renderPersonas();
    }

    function syncSortHeader(button) {
        const sortKey = button.dataset.sortKey;
        const headerCell = button.closest("[role='columnheader']");
        const active = state.sortKey === sortKey;
        const directionLabel = sortDirectionLabels[state.sortDirection];
        const nextDirection = active
            ? (state.sortDirection === "asc" ? "desc" : "asc")
            : (defaultSortDirections[sortKey] || "asc");
        const nextDirectionLabel = sortDirectionLabels[nextDirection];

        button.classList.toggle("active", active);
        button.setAttribute("aria-label", active
            ? `${button.textContent.trim()} ${directionLabel} 정렬됨. 클릭하면 ${nextDirectionLabel}으로 변경`
            : `${button.textContent.trim()} ${nextDirectionLabel} 정렬`);
        headerCell.setAttribute("aria-sort", active
            ? (state.sortDirection === "asc" ? "ascending" : "descending")
            : "none");
        button.querySelector(".sort-arrow").textContent = active
            ? (state.sortDirection === "asc" ? "↑" : "↓")
            : "↑";
    }

    async function issueTokenForRow(persona, row) {
        const panel = row.querySelector(".token-panel");
        const issueButton = row.querySelector("[data-issue-token]");
        if (state.issuedTokensByPersonaKey.has(persona.personaKey)) {
            toggleTokenPanel(row, persona);
            return;
        }

        panel.hidden = false;
        panel.textContent = "발급 중";
        issueButton.disabled = true;
        issueButton.textContent = "발급 중";
        try {
            const token = await issueToken(persona.personaKey);
            rememberIssuedToken(persona.personaKey, token);
            state.expandedTokenPanelKeys.add(persona.personaKey);
            renderTokenPanel(panel, token);
            syncTokenButtonState(row, persona);
            await copyAccessToken(
                token.accessToken,
                status,
                `${persona.personaKey} Access Token 복사 완료`
            );
        } catch (error) {
            panel.textContent = error.message;
            setStatus(status, error.message, "error");
        } finally {
            issueButton.disabled = false;
            syncTokenButtonState(row, persona);
        }
    }

    function toggleTokenPanel(row, persona) {
        const panel = row.querySelector(".token-panel");
        const issuedToken = state.issuedTokensByPersonaKey.get(persona.personaKey);
        if (!issuedToken) {
            return;
        }

        if (panel.hidden) {
            state.expandedTokenPanelKeys.add(persona.personaKey);
            renderTokenPanel(panel, issuedToken);
        } else {
            state.expandedTokenPanelKeys.delete(persona.personaKey);
            panel.hidden = true;
        }
        syncTokenButtonState(row, persona);
    }

    function syncTokenButtonState(row, persona) {
        const button = row.querySelector("[data-issue-token]");
        const panel = row.querySelector(".token-panel");
        const hasIssuedToken = state.issuedTokensByPersonaKey.has(persona.personaKey);

        button.dataset.toggleTokenPanel = String(hasIssuedToken);
        button.classList.toggle("primary", !hasIssuedToken);
        button.setAttribute("aria-expanded", String(hasIssuedToken && !panel.hidden));
        if (!hasIssuedToken) {
            button.textContent = "발급";
            button.setAttribute("aria-label", `${persona.personaKey} 토큰 발급`);
            return;
        }
        if (panel.hidden) {
            button.textContent = "보기";
            button.setAttribute("aria-label", `${persona.personaKey} 발급된 토큰 보기`);
            return;
        }
        button.textContent = "접기";
        button.setAttribute("aria-label", `${persona.personaKey} 발급된 토큰 접기`);
    }

    async function createPersona() {
        state.isCreating = true;
        state.createCompleted = false;
        syncCreateButton();
        setStatus(modalStatus, "생성 중", "");
        const payload = {
            personaKey: document.querySelector("#personaKey").value.trim(),
            nickname: document.querySelector("#nickname").value.trim(),
            template: state.selectedTemplate
        };
        try {
            const response = await requestJson("/dev/auth/personas", {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const personaKey = response.data.persona.personaKey;
            const token = await issueToken(personaKey);
            rememberIssuedToken(personaKey, token);
            await loadPersonas();
            renderTokenPanel(modalTokenPanel, token);
            state.createCompleted = true;
            setStatus(modalStatus, `${personaKey} 생성 완료`, "success");
            await copyAccessToken(token.accessToken, modalStatus, "Access Token 복사 완료");
        } catch (error) {
            state.createCompleted = false;
            setStatus(modalStatus, error.message, "error");
        } finally {
            state.isCreating = false;
            syncCreateButton();
        }
    }

    async function issueToken(personaKey) {
        const response = await requestJson("/dev/auth/token", {
            method: "POST",
            body: JSON.stringify({personaKey})
        });
        return response.data;
    }

    function selectRoleFilter(roleFilter) {
        state.roleFilter = roleFilter;
        document.querySelectorAll("[data-role-filter]").forEach(button => {
            button.classList.toggle("selected", button.dataset.roleFilter === roleFilter);
        });
        renderPersonas();
    }

    function getVisiblePersonas() {
        return state.personas
            .filter(persona => state.roleFilter === "all" || persona.role === state.roleFilter)
            .sort(resolveSortComparator());
    }

    function resolveSortComparator() {
        return (left, right) => compareBySortColumn(left, right) || compareText(left.personaKey, right.personaKey);
    }

    function compareBySortColumn(left, right) {
        if (state.sortKey === "createdAt") {
            return compareCreatedAt(left, right, state.sortDirection);
        }

        const direction = state.sortDirection === "asc" ? 1 : -1;
        return direction * compareText(getSortValue(left, state.sortKey), getSortValue(right, state.sortKey));
    }

    function getSortValue(persona, sortKey) {
        if (sortKey === "template") {
            return formatTemplate(persona.template);
        }
        if (sortKey === "nickname") {
            return persona.nickname;
        }
        if (sortKey === "role") {
            return formatRole(persona.role);
        }
        if (sortKey === "memberStatus") {
            return formatMemberStatus(persona.memberStatus);
        }
        if (sortKey === "instructorStatus") {
            return formatInstructorStatus(persona.instructorStatus);
        }
        return persona.personaKey;
    }

    function compareCreatedAt(left, right, direction) {
        const leftTime = toTimestamp(left.createdAt);
        const rightTime = toTimestamp(right.createdAt);
        if (leftTime === rightTime) {
            return 0;
        }
        if (leftTime === null) {
            return 1;
        }
        if (rightTime === null) {
            return -1;
        }
        return direction === "asc" ? leftTime - rightTime : rightTime - leftTime;
    }

    function compareText(left, right) {
        return String(left || "").localeCompare(String(right || ""), "ko-KR");
    }

    function toTimestamp(value) {
        const timestamp = new Date(value).getTime();
        return Number.isNaN(timestamp) ? null : timestamp;
    }

    function updateSummary(visiblePersonas) {
        const consumerCount = state.personas.filter(persona => persona.role === "CONSUMER").length;
        const instructorCount = state.personas.filter(persona => persona.role === "INSTRUCTOR").length;
        summary.textContent = `전체 ${state.personas.length}명 · 표시 ${visiblePersonas.length}명 · 강습생 ${consumerCount}명 · 강사 ${instructorCount}명`;
    }

    function formatTemplate(template) {
        return templateLabels[template] || template;
    }

    function templateBadgeClass(template) {
        return templateBadgeClasses[template] || "template-badge--neutral";
    }

    function formatRole(role) {
        return roleLabels[role] || role;
    }

    function formatMemberStatus(memberStatus) {
        return memberStatusLabels[memberStatus] || memberStatus;
    }

    function formatInstructorStatus(instructorStatus) {
        return instructorStatusLabels[instructorStatus] || instructorStatus;
    }

    function formatCreatedAt(value) {
        const timestamp = toTimestamp(value);
        if (timestamp === null) {
            return "-";
        }
        return createdAtFormatter.format(new Date(timestamp));
    }

    function renderRoleChoices() {
        roleChoices.replaceChildren();
        roleOptions.forEach(option => {
            const button = document.createElement("button");
            button.className = "choice role-card";
            button.type = "button";
            button.setAttribute("role", "radio");
            button.dataset.roleChoice = option.value;
            button.setAttribute("aria-checked", "false");
            button.innerHTML = createChoiceMarkup({
                artwork: roleArtwork[option.value],
                title: option.title,
                description: option.description
            });
            roleChoices.append(button);
        });
    }

    function createChoiceMarkup({artwork, title, description}) {
        return `
            <span class="choice-visual">${artwork}</span>
            <span class="choice-body">
                <span class="choice-title">${escapeHtml(title)}</span>
                <span class="choice-help">${escapeHtml(description)}</span>
            </span>
            <span class="choice-check" aria-hidden="true">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 12.5L10.5 16L17 8" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </span>
        `;
    }

    function createSvgArtwork(symbolId, className) {
        return `
            <svg class="choice-svg ${className}" viewBox="0 0 160 120" aria-hidden="true" focusable="false">
                <use href="#${symbolId}" width="160" height="120"></use>
            </svg>
        `;
    }

    function selectRole(role) {
        state.selectedRole = role;
        state.selectedTemplate = null;
        document.querySelectorAll("[data-role-choice]").forEach(button => {
            const selected = button.dataset.roleChoice === role;
            updateChoiceSelection(button, selected);
        });
        renderTemplateChoices(role);
        syncCreateButton();
    }

    function renderTemplateChoices(role) {
        templateField.hidden = false;
        templateChoices.replaceChildren();
        templatesByRole[role].forEach(([value, label]) => {
            const button = document.createElement("button");
            button.className = "choice status-card";
            button.type = "button";
            button.setAttribute("role", "radio");
            button.dataset.templateChoice = value;
            button.setAttribute("aria-checked", "false");
            button.innerHTML = createChoiceMarkup({
                artwork: statusArtwork[value],
                title: label,
                description: templateDescriptions[value]
            });
            button.addEventListener("click", () => selectTemplate(button));
            templateChoices.append(button);
        });
    }

    function selectTemplate(button) {
        state.selectedTemplate = button.dataset.templateChoice;
        [...templateChoices.children].forEach(child => {
            updateChoiceSelection(child, child === button);
        });
        syncCreateButton();
    }

    function updateChoiceSelection(button, selected) {
        button.classList.toggle("selected", selected);
        button.setAttribute("aria-checked", String(selected));
        button.tabIndex = selected ? 0 : -1;
    }

    function handleChoiceKeydown(event, selector, select) {
        const buttons = [...event.currentTarget.querySelectorAll(selector)];
        const current = event.target.closest(selector);
        const currentIndex = buttons.indexOf(current);

        if (currentIndex < 0) {
            return;
        }

        if (event.key === " " || event.key === "Enter") {
            event.preventDefault();
            select(current);
            return;
        }

        const direction = {
            ArrowRight: 1,
            ArrowDown: 1,
            ArrowLeft: -1,
            ArrowUp: -1
        }[event.key];

        if (!direction) {
            return;
        }

        event.preventDefault();
        const next = buttons[(currentIndex + direction + buttons.length) % buttons.length];
        next.focus();
        select(next);
    }

    function syncCreateButton() {
        if (state.isCreating) {
            createButton.textContent = "생성 중";
            createButton.disabled = true;
            return;
        }
        if (state.createCompleted) {
            createButton.textContent = "생성 완료";
            createButton.disabled = true;
            return;
        }
        const personaKey = document.querySelector("#personaKey").value.trim();
        const nickname = document.querySelector("#nickname").value.trim();
        createButton.textContent = "유저 생성";
        createButton.disabled = !(personaKey && nickname && state.selectedTemplate);
    }

    function rememberIssuedToken(personaKey, token) {
        state.issuedTokensByPersonaKey.set(personaKey, token);
        state.expandedTokenPanelKeys.add(personaKey);
    }

    function renderTokenPanel(container, token, collapsed = false) {
        container.replaceChildren();
        container.className = "token-panel";
        container.hidden = collapsed;
        container.append(
            createTokenField("Access Token", token.accessToken),
            createTokenField("Refresh Token", token.refreshToken)
        );
    }

    function createTokenField(label, value) {
        const wrapper = document.createElement("div");
        wrapper.className = "token-field";
        const labelElement = document.createElement("label");
        labelElement.textContent = label;
        const textarea = document.createElement("textarea");
        textarea.readOnly = true;
        textarea.value = value;
        const button = document.createElement("button");
        button.className = "button";
        button.type = "button";
        button.dataset.copyTokenButton = "true";
        button.textContent = "복사";
        button.addEventListener("click", async () => {
            try {
                await copyText(value);
                markCopyButtonCopied(button);
                setStatus(status, `${label} 복사 완료`, "success");
                setStatus(modalStatus, `${label} 복사 완료`, "success");
            } catch (error) {
                setStatus(status, error.message, "warning");
                setStatus(modalStatus, error.message, "warning");
            }
        });
        wrapper.append(labelElement, textarea, button);
        return wrapper;
    }

    function markCopyButtonCopied(button) {
        resetCopyButtons();
        button.textContent = "복사 완료";
        button.classList.add("copied");
    }

    function resetCopyButtons() {
        document.querySelectorAll("[data-copy-token-button]").forEach(button => {
            button.textContent = "복사";
            button.classList.remove("copied");
        });
    }

    async function requestJson(url, options = {}) {
        const response = await fetch(url, {
            headers: {"Content-Type": "application/json"},
            ...options
        });
        const payload = await response.json();
        if (!response.ok || payload.success === false) {
            throw new Error(payload.message || payload.code || "요청 실패");
        }
        return payload;
    }

    async function copyText(value) {
        if (!navigator.clipboard?.writeText) {
            throw new Error("이 브라우저에서는 클립보드 복사를 지원하지 않습니다.");
        }
        await navigator.clipboard.writeText(value);
    }

    async function copyAccessToken(value, element, successMessage) {
        try {
            await copyText(value);
            setStatus(element, successMessage, "success");
        } catch (error) {
            // 자동 복사 실패와 토큰 발급 성공의 분리
            setStatus(
                element,
                `토큰 발급 완료. 자동 복사는 실패했습니다. ${error.message}`,
                "warning"
            );
        }
    }

    function setStatus(element, message, kind) {
        element.textContent = message;
        element.className = `status ${kind || ""}`;
    }

    function resetCreateForm() {
        createForm.reset();
        state.isCreating = false;
        state.createCompleted = false;
        state.selectedRole = null;
        state.selectedTemplate = null;
        modalTokenPanel.replaceChildren();
        templateChoices.replaceChildren();
        templateField.hidden = true;
        document.querySelectorAll(".choice").forEach(button => {
            button.classList.remove("selected");
            button.setAttribute("aria-checked", "false");
            button.tabIndex = 0;
        });
        setStatus(modalStatus, "", "");
        syncCreateButton();
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#039;");
    }

    loadPersonas();
</script>
</body>
</html>
