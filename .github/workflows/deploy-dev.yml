name: Deploy Dev

# CI 성공 뒤 호출되는 자동 배포와 긴급한 현재 main 수동 배포 트리거
on:
  workflow_call:
    inputs:
      deploy_sha:
        description: 검증을 통과해 배포할 main commit SHA
        required: true
        type: string
      image_digest:
        description: CI에서 미리 빌드한 Docker image digest
        required: true
        type: string
  # 긴급 상황에서 CI 성공 여부와 무관하게 팀이 명시적으로 실행하는 예외 경로
  # 단, 아래 현재 main SHA 검증은 자동·수동 배포 모두 동일하게 적용한다.
  workflow_dispatch:

# dev 배포 동시 실행 제어
concurrency:
  group: ssing-dev-mutation
  queue: max

# 저장소 읽기 전용 권한
permissions:
  contents: read

# EC2 배포 경로와 Compose 파일명
env:
  DEPLOY_DIR: /home/ubuntu/ssing
  COMPOSE_FILE: docker-compose.dev.yml
  DEPLOY_SHA: ${{ inputs.deploy_sha || github.sha }}

jobs:
  build-and-deploy:
    if: github.ref == 'refs/heads/main'

    # GitHub Environment dev 배포 컨텍스트
    environment: dev

    # EC2 t4g 계열과 동일한 ARM64 빌드 환경
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      # 저장소 코드 체크아웃
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          persist-credentials: false

      # 자동 배포가 대기하는 사이 main이 앞서가면 이전 SHA의 역배포를 차단
      - name: 현재 main SHA 확인
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')"
          if [ "$DEPLOY_SHA" != "$current_main_sha" ]; then
            echo "::error title=오래된 배포 SHA 차단::현재 main이 아닌 ${DEPLOY_SHA} 배포를 차단했습니다. 최신 main CI 또는 긴급 수동 배포를 다시 실행하세요."
            exit 1
          fi
          echo "::notice title=현재 main SHA 확인 완료::배포 SHA가 현재 main과 일치합니다."

      - name: dev DB 대상 로그 마스킹
        env:
          SSING_DEV_DB_HOST: ${{ vars.SSING_DEV_DB_HOST }}
          SSING_DEV_DB_PORT: ${{ vars.SSING_DEV_DB_PORT }}
          SSING_DEV_DB_NAME: ${{ vars.SSING_DEV_DB_NAME }}
          SSING_DEV_RUNTIME_DATASOURCE_URL: ${{ vars.SSING_DEV_DATASOURCE_URL }}
        run: |
          set -euo pipefail
          jdbc_prefix=""
          if [ -n "$SSING_DEV_DB_HOST" ] \
              && [ -n "$SSING_DEV_DB_PORT" ] \
              && [ -n "$SSING_DEV_DB_NAME" ]; then
            jdbc_prefix="jdbc:mysql://${SSING_DEV_DB_HOST}:${SSING_DEV_DB_PORT}/${SSING_DEV_DB_NAME}"
          fi
          for sensitive_value in \
            "$SSING_DEV_DB_HOST" \
            "$SSING_DEV_RUNTIME_DATASOURCE_URL" \
            "$jdbc_prefix"; do
            if [ -n "$sensitive_value" ]; then
              printf '::add-mask::%s\n' "$sensitive_value"
            fi
          done

      # 배포 입력값 사전 점검
      - name: GitHub Variables와 Secrets 사전 점검
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PREBUILT_IMAGE_DIGEST: ${{ inputs.image_digest }}
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
          SSING_DEV_DATASOURCE_URL: ${{ vars.SSING_DEV_DATASOURCE_URL }}
          SSING_DEV_DATASOURCE_USERNAME: ${{ vars.SSING_DEV_DATASOURCE_USERNAME }}
          SSING_DEV_DATASOURCE_PASSWORD: ${{ secrets.SSING_DEV_DATASOURCE_PASSWORD }}
          SSING_DEV_DB_HOST: ${{ vars.SSING_DEV_DB_HOST }}
          SSING_DEV_DB_PORT: ${{ vars.SSING_DEV_DB_PORT }}
          SSING_DEV_DB_NAME: ${{ vars.SSING_DEV_DB_NAME }}
          SSING_DEV_DB_ALLOWED_TARGET_SHA256: ${{ vars.SSING_DEV_DB_ALLOWED_TARGET_SHA256 }}
          SSING_DEV_DB_MIGRATION_USERNAME: ${{ vars.SSING_DEV_DB_MIGRATION_USERNAME }}
          SSING_DEV_DB_MIGRATION_PASSWORD: ${{ secrets.SSING_DEV_DB_MIGRATION_PASSWORD }}
          SSING_DEV_JWT_SECRET: ${{ secrets.SSING_DEV_JWT_SECRET }}
          SSING_DEV_KAKAO_APP_ID: ${{ vars.SSING_DEV_KAKAO_APP_ID }}
          SSING_DEV_DOMAIN: ${{ vars.SSING_DEV_DOMAIN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          FIREBASE_ADMIN_JSON: ${{ secrets.FIREBASE_ADMIN_JSON }}
        run: |
          set -euo pipefail

          echo "::group::배포 입력값 사전 점검"
          echo "필수 GitHub Variables와 Secrets 등록 여부 확인"

          required_vars=(
            DOCKERHUB_IMAGE
            EC2_HOST
            EC2_USERNAME
            EC2_SSH_PRIVATE_KEY
            EC2_SSH_KNOWN_HOSTS
            SSING_DEV_DATASOURCE_URL
            SSING_DEV_DATASOURCE_USERNAME
            SSING_DEV_DATASOURCE_PASSWORD
            SSING_DEV_DB_HOST
            SSING_DEV_DB_PORT
            SSING_DEV_DB_NAME
            SSING_DEV_DB_ALLOWED_TARGET_SHA256
            SSING_DEV_DB_MIGRATION_USERNAME
            SSING_DEV_DB_MIGRATION_PASSWORD
            SSING_DEV_JWT_SECRET
            SSING_DEV_KAKAO_APP_ID
            SSING_DEV_DOMAIN
            SENTRY_DSN
            FIREBASE_ADMIN_JSON
          )

          if [ -z "$PREBUILT_IMAGE_DIGEST" ]; then
            required_vars+=(DOCKERHUB_USERNAME DOCKERHUB_TOKEN)
          elif [[ ! "$PREBUILT_IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error title=이미지 digest 형식 오류::sha256 형식의 검증된 image digest만 사용할 수 있습니다."
            exit 1
          fi

          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error title=GitHub 설정값 누락::${var_name} 값이 비어 있습니다. Repository Settings > Secrets and variables > Actions에서 민감값은 Secrets, 일반 설정값은 Variables에 등록하세요."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "누락된 GitHub Variable 또는 Secret 등록 후 workflow 재실행 필요"
            echo "::endgroup::"
            exit 1
          fi

          if [[ ! "$DEPLOY_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error title=배포 SHA 형식 오류::검증된 40자리 소문자 Git commit SHA만 배포할 수 있습니다."
            echo "::endgroup::"
            exit 1
          fi

          if [ "$SSING_DEV_DOMAIN" != ":80" ]; then
            if [[ "$SSING_DEV_DOMAIN" == *"://"* || "$SSING_DEV_DOMAIN" == *"/"* || "$SSING_DEV_DOMAIN" == *":"* ]]; then
              echo "::error title=dev 도메인 형식 오류::SSING_DEV_DOMAIN에는 https://, 경로, 포트 없이 도메인만 입력하세요. 예: dev-api.ssing.app"
              echo "::endgroup::"
              exit 1
            fi

            if [[ ! "$SSING_DEV_DOMAIN" =~ ^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]{2,63}$ ]]; then
              echo "::error title=dev 도메인 형식 오류::SSING_DEV_DOMAIN 값이 올바른 도메인 형식이 아닙니다. 예: dev-api.ssing.app"
              echo "::endgroup::"
              exit 1
            fi
          fi

          echo "::notice title=배포 입력값 사전 점검 완료::필수 GitHub Variables와 Secrets가 모두 설정되어 있습니다."
          echo "::endgroup::"

      # Docker 이미지 태그 생성
      - name: Docker 이미지 태그 생성
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
        run: |
          set -euo pipefail

          echo "::group::Docker 이미지 태그 생성"
          printf 'IMAGE_TAG=%s\n' "${DOCKERHUB_IMAGE}:dev-${DEPLOY_SHA}" >> "$GITHUB_ENV"
          echo "::notice title=Docker 이미지 태그 생성 완료::검증된 커밋 고정 태그를 생성했습니다."
          echo "::endgroup::"

      # dev 배포 시작 Slack 알림
      - name: Slack 배포 시작 알림
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            attachments:
              - color: "#439FE0"
                fallback: "🚀 SSING dev 배포 시작"
                title: "🚀 SSING dev 배포 시작"
                title_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                fields:
                  - title: "실행자"
                    value: "${{ github.actor }}"
                    short: true
                  - title: "커밋"
                    value: "<${{ github.server_url }}/${{ github.repository }}/commit/${{ env.DEPLOY_SHA }}|커밋 보기>"
                    short: true
                  - title: "실행 내역"
                    value: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions에서 보기>"
                mrkdwn_in:
                  - fields

      # 자동 배포는 CI가 만든 불변 image digest가 없으면 재빌드하지 않고 실패
      - name: 자동 배포 Docker 이미지 digest 확인
        if: github.event_name != 'workflow_dispatch'
        env:
          PREBUILT_IMAGE_DIGEST: ${{ inputs.image_digest }}
        run: |
          set -euo pipefail

          if [[ ! "$PREBUILT_IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error title=자동 배포 이미지 digest 누락::CI build job에서 만든 image digest가 없어 자동 배포를 차단했습니다."
            exit 1
          fi

      # 긴급 수동 배포만 Docker Hub에 로그인해 현재 main 이미지를 직접 빌드
      - name: Docker Hub 로그인
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ARM64 Docker 이미지 빌드 도구
      - name: Docker Buildx 준비
        if: github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      # ARM64 Docker 이미지 빌드와 push
      - name: ARM64 Docker 이미지 빌드와 푸시
        id: build-image
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # 자동 배포는 CI build job의 digest를, 긴급 수동 배포는 바로 위 build 결과를 사용
      - name: Docker 이미지 digest 고정
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
          PREBUILT_IMAGE_DIGEST: ${{ inputs.image_digest }}
          BUILT_IMAGE_DIGEST: ${{ steps.build-image.outputs.digest }}
        run: |
          set -euo pipefail

          image_digest="${PREBUILT_IMAGE_DIGEST:-$BUILT_IMAGE_DIGEST}"
          if [[ ! "$image_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error title=이미지 digest 확인 실패::CI build 결과 또는 수동 build 결과의 digest가 없습니다."
            exit 1
          fi
          printf 'IMAGE_DIGEST=%s\n' "$image_digest" >> "$GITHUB_ENV"
          printf 'IMAGE_REF=%s:dev-%s@%s\n' \
            "$DOCKERHUB_IMAGE" "$DEPLOY_SHA" "$image_digest" >> "$GITHUB_ENV"

      # EC2 SSH 접속 준비
      - name: EC2 SSH 접속 준비
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          echo "::group::EC2 SSH 접속 준비"
          echo "SSH 개인 키와 고정 known_hosts 파일 준비"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ssing-dev-key
          chmod 600 ~/.ssh/ssing-dev-key

          printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if ! ssh-keygen -l -f ~/.ssh/known_hosts >/dev/null; then
            echo "::error title=EC2 host key 검증 실패::EC2_SSH_KNOWN_HOSTS가 유효한 known_hosts 형식인지 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=EC2 SSH 접속 준비 완료::동적 host key 수집 없이 저장된 값만 사용합니다."
          echo "::endgroup::"

      # Firebase 서비스 계정 키를 GitHub Secret에서 EC2 런타임 파일로만 복원
      - name: Firebase 서비스 계정 키 복원
        env:
          FIREBASE_ADMIN_JSON: ${{ secrets.FIREBASE_ADMIN_JSON }}
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
        run: |
          set -euo pipefail

          echo "::group::Firebase 서비스 계정 키 복원"
          umask 077
          credential_file="$(mktemp)"
          trap 'rm -f "$credential_file"' EXIT

          printf '%s' "$FIREBASE_ADMIN_JSON" > "$credential_file"

          if ! jq -e '.type == "service_account" and (.private_key | type == "string")' "$credential_file" >/dev/null; then
            echo "::error title=Firebase 서비스 계정 키 형식 오류::복원된 JSON이 서비스 계정 키인지 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"
          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "install -d -m 700 '$DEPLOY_DIR/secrets'"; then
            echo "::error title=EC2 Firebase 키 디렉터리 생성 실패::배포 계정의 $DEPLOY_DIR 권한을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          if ! scp -i ~/.ssh/ssing-dev-key "$credential_file" \
            "$SSH_TARGET:$DEPLOY_DIR/secrets/firebase-admin.json.next"; then
            echo "::error title=EC2 Firebase 키 업로드 실패::SSH 연결과 EC2 디렉터리 권한을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "chmod 444 '$DEPLOY_DIR/secrets/firebase-admin.json.next' && mv -f '$DEPLOY_DIR/secrets/firebase-admin.json.next' '$DEPLOY_DIR/secrets/firebase-admin.json'"; then
            echo "::error title=EC2 Firebase 키 교체 실패::EC2 파일 권한과 디스크 여유 공간을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=Firebase 서비스 계정 키 복원 완료::키를 EC2 런타임 파일로만 복원했습니다."
          echo "::endgroup::"

      # 기존 dev runtime DB 비밀번호를 Adminer 컨테이너 전용 secret 파일로 복원
      - name: Adminer DB 비밀번호 파일 복원
        env:
          SSING_DATASOURCE_PASSWORD: ${{ secrets.SSING_DEV_DATASOURCE_PASSWORD }}
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
        run: |
          set -euo pipefail

          echo "::group::Adminer DB 비밀번호 파일 복원"
          umask 077
          password_file="$(mktemp)"
          trap 'rm -f "$password_file"' EXIT
          printf '%s' "$SSING_DATASOURCE_PASSWORD" > "$password_file"

          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"
          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "install -d -m 700 '$DEPLOY_DIR/secrets'"; then
            echo "::error title=EC2 Adminer secret 디렉터리 생성 실패::배포 계정의 $DEPLOY_DIR 권한을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          if ! scp -i ~/.ssh/ssing-dev-key "$password_file" \
            "$SSH_TARGET:$DEPLOY_DIR/secrets/adminer-db-password.next"; then
            echo "::error title=EC2 Adminer secret 업로드 실패::SSH 연결과 EC2 디렉터리 권한을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "chmod 444 '$DEPLOY_DIR/secrets/adminer-db-password.next' && mv -f '$DEPLOY_DIR/secrets/adminer-db-password.next' '$DEPLOY_DIR/secrets/adminer-db-password'"; then
            echo "::error title=EC2 Adminer secret 교체 실패::EC2 파일 권한과 디스크 여유 공간을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=Adminer DB 비밀번호 파일 복원 완료::비밀번호를 브라우저나 컨테이너 환경변수에 넣지 않고 secret 파일로 준비했습니다."
          echo "::endgroup::"

      # marker가 있으면 앱은 계속 막되 최신 main의 전체 초기화로 복구를 시도
      - name: 미완료 dev DB 작업 확인
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
        run: |
          set -euo pipefail

          echo "::group::미완료 dev DB 작업 확인"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"
          if ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "test -e '$DEPLOY_DIR/.dev-db-reset-incomplete'"; then
            echo "::warning title=미완료 dev DB 작업 감지::앱 재기동은 계속 차단한 채 최신 main의 clean·migration·base seed를 처음부터 다시 실행합니다."
          else
            echo "::notice title=dev DB 작업 상태 확인 완료::미완료 marker가 없습니다."
          fi
          echo "::endgroup::"

      # EC2 배포 파일 업로드
      - name: EC2 배포 파일 업로드
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
        run: |
          set -euo pipefail

          echo "::group::EC2 배포 파일 업로드"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"

          echo "배포 디렉터리 생성: $DEPLOY_DIR"
          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "install -d -m 700 '$DEPLOY_DIR' '$DEPLOY_DIR/releases'"; then
            echo "::error title=EC2 배포 디렉터리 생성 실패::EC2_USERNAME, EC2_HOST, SSH 키, EC2 보안 그룹, EC2 디스크 권한을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "Docker Compose, Caddy 후보 설정, Adminer 플러그인, SHA 고정 DB 실행기 업로드"
          caddy_candidate="Caddyfile.candidate-${DEPLOY_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          tar -czf .deploy-db-tooling.tgz \
            scripts/db \
            db/seed \
            src/main/resources/db/migration
          tar -czf .deploy-adminer.tgz -C deploy adminer
          if ! scp -i ~/.ssh/ssing-dev-key \
            deploy/docker-compose.dev.yml \
            .deploy-db-tooling.tgz \
            .deploy-adminer.tgz \
            "$SSH_TARGET:$DEPLOY_DIR/"; then
            rm -f .deploy-db-tooling.tgz .deploy-adminer.tgz
            echo "::error title=EC2 배포 파일 업로드 실패::SSH 접속 상태, $DEPLOY_DIR 디렉터리 권한, 네트워크 연결 상태를 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          # 실행 중인 정상 설정을 먼저 덮지 않도록 현재 run 전용 후보 파일로 올린다.
          if ! scp -i ~/.ssh/ssing-dev-key \
            deploy/Caddyfile "$SSH_TARGET:$DEPLOY_DIR/$caddy_candidate"; then
            rm -f .deploy-db-tooling.tgz .deploy-adminer.tgz
            echo "::error title=EC2 Caddy 후보 설정 업로드 실패::SSH 연결과 EC2 배포 디렉터리 권한을 확인하세요. 기존 Caddyfile은 변경하지 않았습니다."
            echo "::endgroup::"
            exit 1
          fi

          if ! scp -i ~/.ssh/ssing-dev-key \
            scripts/deploy/manage-dev-caddy.sh \
            "$SSH_TARGET:$DEPLOY_DIR/.manage-dev-caddy.sh"; then
            rm -f .deploy-db-tooling.tgz .deploy-adminer.tgz
            echo "::error title=EC2 Caddy 설정 관리기 업로드 실패::SSH 연결과 EC2 배포 디렉터리 권한을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          if ! scp -i ~/.ssh/ssing-dev-key \
            scripts/db/install-dev-release.sh \
            "$SSH_TARGET:$DEPLOY_DIR/.install-dev-release.sh"; then
            rm -f .deploy-db-tooling.tgz .deploy-adminer.tgz
            echo "::error title=release 설치기 업로드 실패::SSH 접속 상태와 $DEPLOY_DIR 디렉터리 권한을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "chmod 644 '$DEPLOY_DIR/$caddy_candidate' && chmod 700 '$DEPLOY_DIR/.manage-dev-caddy.sh' '$DEPLOY_DIR/.install-dev-release.sh' && bash '$DEPLOY_DIR/.install-dev-release.sh' '$DEPLOY_DIR/.deploy-db-tooling.tgz' '$DEPLOY_DIR/releases' '$DEPLOY_SHA' && tar -xzf '$DEPLOY_DIR/.deploy-adminer.tgz' --directory '$DEPLOY_DIR' && rm -f '$DEPLOY_DIR/.install-dev-release.sh' '$DEPLOY_DIR/.deploy-db-tooling.tgz' '$DEPLOY_DIR/.deploy-adminer.tgz'"; then
            rm -f .deploy-db-tooling.tgz .deploy-adminer.tgz
            echo "::error title=DB release와 Adminer 준비 실패::EC2의 tar, 디스크 권한, archive 내용과 release 설치 로그를 확인하세요."
            echo "::endgroup::"
            exit 1
          fi
          rm -f .deploy-db-tooling.tgz .deploy-adminer.tgz

          echo "::notice title=EC2 배포 파일 업로드 완료::Compose, run 전용 Caddy 후보 설정, Adminer 플러그인, ${DEPLOY_SHA} 전용 migration snapshot을 EC2에 준비했습니다."
          echo "::endgroup::"

      # EC2 런타임 환경변수 파일 생성
      - name: EC2 런타임 환경변수 생성
        env:
          SSING_IMAGE: ${{ env.IMAGE_REF }}
          SPRING_PROFILES_ACTIVE: dev
          SSING_DATASOURCE_URL: ${{ vars.SSING_DEV_DATASOURCE_URL }}
          SSING_DATASOURCE_USERNAME: ${{ vars.SSING_DEV_DATASOURCE_USERNAME }}
          SSING_DATASOURCE_PASSWORD: ${{ secrets.SSING_DEV_DATASOURCE_PASSWORD }}
          SSING_JPA_DDL_AUTO: validate
          SSING_DEV_MATCHING_ACTIONS_ENABLED: ${{ vars.SSING_DEV_MATCHING_ACTIONS_ENABLED || 'false' }}
          SSING_DEV_INSTRUCTOR_ACTIONS_ENABLED: ${{ vars.SSING_DEV_INSTRUCTOR_ACTIONS_ENABLED || 'false' }}
          SSING_ADMINER_DEFAULT_SERVER: ${{ vars.SSING_DEV_DB_HOST }}
          SSING_DEV_DB_NAME: ${{ vars.SSING_DEV_DB_NAME }}
          SSING_JWT_SECRET: ${{ secrets.SSING_DEV_JWT_SECRET }}
          SSING_KAKAO_APP_ID: ${{ vars.SSING_DEV_KAKAO_APP_ID }}
          SSING_DEV_DOMAIN: ${{ vars.SSING_DEV_DOMAIN }}
          JAVA_OPTS: ${{ vars.SSING_DEV_JAVA_OPTS }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: dev
          SENTRY_RELEASE: ssing-server@dev-${{ env.DEPLOY_SHA }}
          SENTRY_SAMPLE_RATE: "1.0"
          SENTRY_TRACES_SAMPLE_RATE: "0.0"
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
        run: |
          set -euo pipefail

          echo "::group::EC2 런타임 환경변수 생성"
          echo "GitHub Variables와 Secrets 기반 EC2 .env 파일 생성"

          required_vars=(
            SSING_IMAGE
            SSING_DATASOURCE_URL
            SSING_DATASOURCE_USERNAME
            SSING_DATASOURCE_PASSWORD
            SSING_ADMINER_DEFAULT_SERVER
            SSING_DEV_DB_NAME
            SSING_JWT_SECRET
            SSING_KAKAO_APP_ID
            SSING_DEV_DOMAIN
            SENTRY_DSN
            EC2_HOST
            EC2_USERNAME
          )

          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error title=런타임 환경변수 누락::${var_name} 값이 비어 있습니다. GitHub Variables/Secrets 이름과 workflow env 매핑을 확인하세요."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "누락된 환경변수 등록 후 workflow 재실행 필요"
            echo "::endgroup::"
            exit 1
          fi

          if [ "$SSING_DEV_DOMAIN" != ":80" ]; then
            if [[ "$SSING_DEV_DOMAIN" == *"://"* || "$SSING_DEV_DOMAIN" == *"/"* || "$SSING_DEV_DOMAIN" == *":"* ]]; then
              echo "::error title=dev 도메인 형식 오류::SSING_DEV_DOMAIN에는 https://, 경로, 포트 없이 도메인만 입력하세요. 예: dev-api.ssing.app"
              echo "::endgroup::"
              exit 1
            fi

            if [[ ! "$SSING_DEV_DOMAIN" =~ ^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]{2,63}$ ]]; then
              echo "::error title=dev 도메인 형식 오류::SSING_DEV_DOMAIN 값이 올바른 도메인 형식이 아닙니다. 예: dev-api.ssing.app"
              echo "::endgroup::"
              exit 1
            fi
          fi

          if [ "$SSING_JPA_DDL_AUTO" != "validate" ]; then
            echo "::error title=JPA schema 정책 오류::dev 앱은 ddl-auto=validate로만 배포할 수 있습니다."
            echo "::endgroup::"
            exit 1
          fi
          JAVA_OPTS="${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=40.0}"

          trap 'rm -f .deploy.env' EXIT
          umask 077
          {
            printf 'SSING_IMAGE=%s\n' "$SSING_IMAGE"
            printf 'SPRING_PROFILES_ACTIVE=%s\n' "$SPRING_PROFILES_ACTIVE"
            printf 'SSING_DATASOURCE_URL=%s\n' "$SSING_DATASOURCE_URL"
            printf 'SSING_DATASOURCE_USERNAME=%s\n' "$SSING_DATASOURCE_USERNAME"
            printf 'SSING_DATASOURCE_PASSWORD=%s\n' "$SSING_DATASOURCE_PASSWORD"
            printf 'SSING_JPA_DDL_AUTO=%s\n' "$SSING_JPA_DDL_AUTO"
            printf 'SSING_DEV_MATCHING_ACTIONS_ENABLED=%s\n' "$SSING_DEV_MATCHING_ACTIONS_ENABLED"
            printf 'SSING_DEV_INSTRUCTOR_ACTIONS_ENABLED=%s\n' "$SSING_DEV_INSTRUCTOR_ACTIONS_ENABLED"
            printf 'SSING_ADMINER_DEFAULT_SERVER=%s\n' "$SSING_ADMINER_DEFAULT_SERVER"
            printf 'SSING_DEV_DB_NAME=%s\n' "$SSING_DEV_DB_NAME"
            printf 'SSING_JWT_SECRET=%s\n' "$SSING_JWT_SECRET"
            printf 'SSING_KAKAO_APP_ID=%s\n' "$SSING_KAKAO_APP_ID"
            printf 'SSING_DEV_DOMAIN=%s\n' "$SSING_DEV_DOMAIN"
            printf 'JAVA_OPTS=%s\n' "$JAVA_OPTS"
            printf 'SENTRY_DSN=%s\n' "$SENTRY_DSN"
            printf 'SENTRY_ENVIRONMENT=%s\n' "$SENTRY_ENVIRONMENT"
            printf 'SENTRY_RELEASE=%s\n' "$SENTRY_RELEASE"
            printf 'SENTRY_SAMPLE_RATE=%s\n' "$SENTRY_SAMPLE_RATE"
            printf 'SENTRY_TRACES_SAMPLE_RATE=%s\n' "$SENTRY_TRACES_SAMPLE_RATE"
          } > .deploy.env

          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"

          echo "EC2 .env.next 후보 파일 업로드"
          if ! scp -i ~/.ssh/ssing-dev-key .deploy.env "$SSH_TARGET:$DEPLOY_DIR/.env.next"; then
            echo "::error title=EC2 .env 업로드 실패::SSH 연결, $DEPLOY_DIR 권한, EC2 디스크 여유 공간을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "EC2 .env.next 파일 권한 제한"
          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" "chmod 600 '$DEPLOY_DIR/.env.next'"; then
            echo "::error title=EC2 .env 권한 설정 실패::EC2_USERNAME 사용자가 $DEPLOY_DIR/.env.next 파일 권한을 변경할 수 있는지 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=EC2 런타임 환경변수 후보 준비 완료::migration·컨테이너 재기동·health가 통과하면 .env.next를 현재 .env로 원자적으로 전환합니다."
          echo "::endgroup::"

      # DB를 초기화하기 전에 Caddy 후보 문법과 이전 미완료 transaction 복구 가능 여부를 먼저 확인
      - name: Caddy 후보 설정 사전 검증
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
          SSING_DEV_DOMAIN: ${{ vars.SSING_DEV_DOMAIN }}
        run: |
          set -euo pipefail

          echo "::group::Caddy 후보 설정 사전 검증"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"
          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "DEPLOY_DIR='$DEPLOY_DIR' COMPOSE_FILE='$COMPOSE_FILE' DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_RUN_ID='$GITHUB_RUN_ID' DEPLOY_RUN_ATTEMPT='$GITHUB_RUN_ATTEMPT' SSING_DEV_DOMAIN='$SSING_DEV_DOMAIN' bash -s" <<'EOF'
          set -euo pipefail
          "$DEPLOY_DIR/.manage-dev-caddy.sh" preflight
          EOF
          then
            echo "::error title=Caddy 후보 설정 사전 검증 실패::dev DB는 아직 초기화하지 않았습니다. 후보 설정 또는 보존된 rollback transaction을 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=Caddy 후보 설정 사전 검증 완료::dev DB 초기화 전에 후보 문법과 기존 Caddy 복구 상태를 확인했습니다."
          echo "::endgroup::"

      # 앱과 DB를 건드리기 전에 후보 설정, image, DB 연결, Flyway 실행 가능 여부를 확인
      - name: EC2 배포 사전 검증
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
          SSING_DEV_DB_HOST: ${{ vars.SSING_DEV_DB_HOST }}
          SSING_DEV_DB_PORT: ${{ vars.SSING_DEV_DB_PORT }}
          SSING_DEV_DB_NAME: ${{ vars.SSING_DEV_DB_NAME }}
          SSING_DEV_DB_ALLOWED_TARGET_SHA256: ${{ vars.SSING_DEV_DB_ALLOWED_TARGET_SHA256 }}
          SSING_DEV_RUNTIME_DATASOURCE_URL: ${{ vars.SSING_DEV_DATASOURCE_URL }}
          SSING_DEV_RUNTIME_DB_USERNAME: ${{ vars.SSING_DEV_DATASOURCE_USERNAME }}
          SSING_DEV_DB_MIGRATION_USERNAME: ${{ vars.SSING_DEV_DB_MIGRATION_USERNAME }}
          SSING_DEV_DB_MIGRATION_PASSWORD: ${{ secrets.SSING_DEV_DB_MIGRATION_PASSWORD }}
        run: |
          set -euo pipefail
          echo "::group::EC2 배포 사전 검증"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"
          remote_env_path="$DEPLOY_DIR/.migration.env"
          trap 'rm -f .migration.env' EXIT
          umask 077
          {
            printf 'SSING_SEED_TARGET_ENV=%q\n' dev
            printf 'SSING_DEV_DEPLOY_DIR=%q\n' "$DEPLOY_DIR"
            printf 'SSING_DEV_DB_HOST=%q\n' "$SSING_DEV_DB_HOST"
            printf 'SSING_DEV_DB_PORT=%q\n' "$SSING_DEV_DB_PORT"
            printf 'SSING_DEV_DB_NAME=%q\n' "$SSING_DEV_DB_NAME"
            printf 'SSING_DEV_DB_ALLOWED_TARGET_SHA256=%q\n' "$SSING_DEV_DB_ALLOWED_TARGET_SHA256"
            printf 'SSING_DEV_RUNTIME_DATASOURCE_URL=%q\n' "$SSING_DEV_RUNTIME_DATASOURCE_URL"
            printf 'SSING_DEV_RUNTIME_DB_USERNAME=%q\n' "$SSING_DEV_RUNTIME_DB_USERNAME"
            printf 'SSING_DEV_DB_MIGRATION_USERNAME=%q\n' "$SSING_DEV_DB_MIGRATION_USERNAME"
            printf 'SSING_DEV_DB_MIGRATION_PASSWORD=%q\n' "$SSING_DEV_DB_MIGRATION_PASSWORD"
            printf 'SSING_DEPLOY_COMMIT_SHA=%q\n' "$DEPLOY_SHA"
          } > .migration.env

          scp -i ~/.ssh/ssing-dev-key .migration.env "$SSH_TARGET:$remote_env_path"
          ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" "chmod 600 '$remote_env_path'"
          printf -v remote_command 'bash -s -- %q %q' "$DEPLOY_DIR" "$DEPLOY_SHA"

          set +e
          ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" "$remote_command" <<'EOF'
          set -euo pipefail
          deploy_dir="$1"
          deploy_sha="$2"
          release_dir="$deploy_dir/releases/$deploy_sha"
          cd "$release_dir"
          set -a
          source "$deploy_dir/.migration.env"
          set +a
          ./scripts/db/prepare-dev-deploy-db.sh --preflight-dev-deploy main
          EOF
          preflight_exit_code=$?
          set -e

          if [ "$preflight_exit_code" -ne 0 ]; then
            ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
              "rm -f '$remote_env_path' '$DEPLOY_DIR/.dev-deploy-preflight'" || true
            echo "::error title=EC2 배포 사전 검증 실패::기존 앱과 DB는 변경하지 않았습니다. Compose, image pull, DB 연결, Flyway 로그를 확인하세요."
            echo "::endgroup::"
            exit "$preflight_exit_code"
          fi

          echo "::notice title=EC2 배포 사전 검증 완료::후보 Compose, image, DB 연결, Flyway 실행기를 확인했습니다."
          echo "::endgroup::"

      # 느린 사전 검증 사이 main이 바뀌면 파괴 작업 직전에 중단
      - name: dev DB 초기화 직전 현재 main SHA 재확인
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')"
          if [ "$DEPLOY_SHA" != "$current_main_sha" ]; then
            echo "::error title=오래된 DB 초기화 차단::현재 main이 아닌 ${DEPLOY_SHA}의 migration과 seed를 차단했습니다."
            exit 1
          fi

      # 새 앱을 재기동하기 전에 dev 데이터 폐기 후 최신 schema와 base seed를 준비
      - name: dev DB clean·migration·base seed
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
        run: |
          set -euo pipefail
          echo "::group::dev DB clean·migration·base seed"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"
          remote_env_path="$DEPLOY_DIR/.migration.env"
          printf -v remote_command 'bash -s -- %q %q' "$DEPLOY_DIR" "$DEPLOY_SHA"

          set +e
          ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" "$remote_command" <<'EOF'
          set -euo pipefail
          deploy_dir="$1"
          deploy_sha="$2"
          release_dir="$deploy_dir/releases/$deploy_sha"
          cd "$release_dir"
          trap 'rm -f "$deploy_dir/.migration.env"' EXIT
          [[ -s "$deploy_dir/.migration.env" ]]
          set -a
          source "$deploy_dir/.migration.env"
          set +a
          ./scripts/db/prepare-dev-deploy-db.sh --confirm-dev-deploy-reset main
          EOF
          migration_exit_code=$?
          set -e

          ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" "rm -f '$remote_env_path'" || true
          if [ "$migration_exit_code" -ne 0 ]; then
            echo "::error title=dev DB 준비 실패::앱은 재기동하지 않았습니다. incomplete marker와 clean·migration·seed 로그를 확인하세요."
            echo "::endgroup::"
            exit "$migration_exit_code"
          fi

          echo "::notice title=dev DB 준비 완료::clean, migrate, validate, base seed 검증이 통과했습니다."
          echo "::endgroup::"

      # DB 준비 중 main이 바뀐 경우 오래된 이미지의 재기동을 차단
      - name: Compose 재시작 직전 현재 main SHA 재확인
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')"
          if [ "$DEPLOY_SHA" != "$current_main_sha" ]; then
            echo "::error title=오래된 앱 재기동 차단::DB는 최신 main 배포가 다시 준비하도록 두고 ${DEPLOY_SHA} 앱은 시작하지 않습니다."
            exit 1
          fi

      # EC2 Docker Compose 재시작
      - name: EC2 Docker Compose 재시작
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
        run: |
          set -euo pipefail

          echo "::group::EC2 Docker Compose 재시작"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"

          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "DEPLOY_DIR='$DEPLOY_DIR' COMPOSE_FILE='$COMPOSE_FILE' DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_RUN_ID='$GITHUB_RUN_ID' DEPLOY_RUN_ATTEMPT='$GITHUB_RUN_ATTEMPT' bash -s" <<'EOF'
          set -euo pipefail
          echo "배포 디렉터리 이동: $DEPLOY_DIR"
          cd "$DEPLOY_DIR"

          if [ -e .dev-db-reset-incomplete ]; then
            echo "dev DB reset incomplete marker가 있어 앱 재기동을 차단합니다."
            exit 1
          fi

          if [ ! -f .env.next ]; then
            echo "검증할 새 런타임 .env.next 파일이 없습니다."
            exit 1
          fi

          echo "사전 검증에서 받은 후보 image로 Docker Compose 컨테이너 재시작"
          # 다음 배포가 .env.next를 덮어써도 실행 중 후보를 찾을 수 있도록 run별 파일과 marker를 함께 남긴다.
          candidate_env=".env.candidate-${DEPLOY_SHA}-${DEPLOY_RUN_ID}-${DEPLOY_RUN_ATTEMPT}"
          mv -f .env.next "$candidate_env"
          printf '%s\n' "$candidate_env" > .dev-deploy-compose-started.tmp
          chmod 600 .dev-deploy-compose-started.tmp
          mv -f .dev-deploy-compose-started.tmp .dev-deploy-compose-started
          sudo env SSING_RUNTIME_ENV_FILE="$candidate_env" \
            docker compose --env-file "$candidate_env" -f "$COMPOSE_FILE" up --pull never -d --remove-orphans app adminer

          echo "Docker Compose 컨테이너 상태"
          sudo env SSING_RUNTIME_ENV_FILE="$candidate_env" \
            docker compose --env-file "$candidate_env" -f "$COMPOSE_FILE" ps
          EOF
          then
            echo "::error title=EC2 Docker Compose 재시작 실패::Docker 실행 상태, 이미지 pull 가능 여부, docker-compose.dev.yml 문법, run별 후보 설정과 marker를 확인하세요. 기존 .env는 교체하지 않았습니다."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=EC2 Docker Compose 재시작 완료::사전 검증한 image로 컨테이너 재시작을 완료했습니다."
          echo "::endgroup::"

      # 앱이 후보 설정으로 정상 기동한 것을 확인한 뒤 현재 런타임 설정을 먼저 확정
      - name: 애플리케이션 내부 헬스체크 및 런타임 설정 승격
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
        run: |
          set -euo pipefail

          echo "::group::애플리케이션 내부 헬스체크 및 런타임 설정 승격"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"

          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "DEPLOY_DIR='$DEPLOY_DIR' COMPOSE_FILE='$COMPOSE_FILE' DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_RUN_ID='$GITHUB_RUN_ID' DEPLOY_RUN_ATTEMPT='$GITHUB_RUN_ATTEMPT' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_DIR"

          candidate_env=".env.candidate-${DEPLOY_SHA}-${DEPLOY_RUN_ID}-${DEPLOY_RUN_ATTEMPT}"
          if [ ! -f .dev-deploy-compose-started ]; then
            echo "후보 Compose marker가 없어 실행 중인 후보 설정을 확인할 수 없습니다."
            exit 1
          fi
          active_candidate="$(< .dev-deploy-compose-started)"
          if [ "$active_candidate" != "$candidate_env" ]; then
            echo "후보 Compose marker가 현재 배포 run의 후보 설정과 일치하지 않습니다."
            exit 1
          fi
          if [ ! -f "$candidate_env" ]; then
            echo "현재 배포 run의 후보 설정 파일이 없습니다: $candidate_env"
            exit 1
          fi

          for attempt in {1..30}; do
            echo "애플리케이션 내부 헬스체크 시도: ${attempt}/30"
            if curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "애플리케이션 내부 헬스체크 성공: app status UP"
              echo "검증을 마친 런타임 설정으로 원자적 전환"
              if ! mv -f "$candidate_env" .env; then
                echo "런타임 설정 전환 실패: SHA 고정 후보 설정을 .env로 교체하지 못했습니다. 파일 권한과 디스크 여유 공간을 확인하세요."
                exit 1
              fi
              rm -f .dev-deploy-compose-started
              rm -f .env.candidate-*
              exit 0
            fi

            sleep 5
          done

          echo "애플리케이션 내부 헬스체크 실패: app 컨테이너 최근 로그"
          sudo env SSING_RUNTIME_ENV_FILE="$candidate_env" \
            docker compose --env-file "$candidate_env" -f "$COMPOSE_FILE" logs --tail=100 app
          exit 1
          EOF
          then
            echo "::error title=애플리케이션 내부 검증 실패::app health 로그와 런타임 설정 전환 실패 메시지를 확인하세요. 기존 .env 보존 여부, run별 후보 설정과 marker, 디스크 여유 공간을 함께 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=애플리케이션 내부 검증 완료::app status UP을 확인하고 현재 run의 후보 설정을 .env로 승격했습니다."
          echo "::endgroup::"

      # 실행 중인 Caddy에 후보를 반영하되 두 smoke가 끝날 때까지 기존 정상 설정을 보관
      - name: Caddy 설정 검증 및 무중단 반영
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
          SSING_DEV_DOMAIN: ${{ vars.SSING_DEV_DOMAIN }}
        run: |
          set -euo pipefail

          echo "::group::Caddy 설정 검증 및 무중단 반영"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"

          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "DEPLOY_DIR='$DEPLOY_DIR' COMPOSE_FILE='$COMPOSE_FILE' DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_RUN_ID='$GITHUB_RUN_ID' DEPLOY_RUN_ATTEMPT='$GITHUB_RUN_ATTEMPT' SSING_DEV_DOMAIN='$SSING_DEV_DOMAIN' bash -s" <<'EOF'
          set -euo pipefail
          "$DEPLOY_DIR/.manage-dev-caddy.sh" activate
          EOF
          then
            echo "::error title=Caddy 설정 반영 실패::새 후보 설정은 적용하지 않았거나 기존 live 설정으로 복구했습니다. Caddy validate/reload 로그와 컨테이너 상태를 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=Caddy 후보 설정 반영 완료::두 smoke가 모두 통과할 때까지 이전 정상 설정을 복구 가능하게 보관합니다."
          echo "::endgroup::"

      # 외부 도메인 HTTPS 헬스체크
      - name: 외부 도메인 HTTPS 헬스체크
        id: caddy_app_health
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          SSING_DEV_DOMAIN: ${{ vars.SSING_DEV_DOMAIN }}
        run: |
          set -euo pipefail

          echo "::group::외부 도메인 HTTPS 헬스체크"

          if [ "$SSING_DEV_DOMAIN" = ":80" ]; then
            HEALTH_URL="http://${EC2_HOST}/actuator/health"
          else
            HEALTH_URL="https://${SSING_DEV_DOMAIN}/actuator/health"
          fi

          for attempt in {1..30}; do
            echo "외부 헬스체크 시도: ${attempt}/30 (${HEALTH_URL})"
            if curl -fsS --max-time 10 "$HEALTH_URL" | grep -q '"status":"UP"'; then
              echo "외부 헬스체크 성공: ${HEALTH_URL} status UP"
              echo "::notice title=외부 도메인 HTTPS 헬스체크 완료::${HEALTH_URL} 응답이 UP입니다."
              echo "::endgroup::"
              exit 0
            fi

            sleep 5
          done

          echo "::error title=외부 도메인 HTTPS 헬스체크 실패::${HEALTH_URL} 응답이 UP이 아닙니다. DNS A 레코드, EC2 80/443 인바운드, Caddy 인증서 발급, reverse proxy 상태를 확인하세요."
          echo "::endgroup::"
          exit 1

      # 앱 런타임 승격과 외부 health가 끝난 뒤 Adminer 자동 로그인만 별도로 검증
      - name: Adminer 자동 로그인 스모크 체크
        id: adminer_smoke
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
          SSING_DEV_DOMAIN: ${{ vars.SSING_DEV_DOMAIN }}
          SSING_ADMINER_DEFAULT_SERVER: ${{ vars.SSING_DEV_DB_HOST }}
          SSING_DATASOURCE_USERNAME: ${{ vars.SSING_DEV_DATASOURCE_USERNAME }}
          SSING_DEV_DB_NAME: ${{ vars.SSING_DEV_DB_NAME }}
        run: |
          set -euo pipefail

          echo "::group::Adminer 자동 로그인 스모크 체크"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"

          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "DEPLOY_DIR='$DEPLOY_DIR' COMPOSE_FILE='$COMPOSE_FILE' SSING_DEV_DOMAIN='$SSING_DEV_DOMAIN' SSING_ADMINER_DEFAULT_SERVER='$SSING_ADMINER_DEFAULT_SERVER' SSING_DATASOURCE_USERNAME='$SSING_DATASOURCE_USERNAME' SSING_DEV_DB_NAME='$SSING_DEV_DB_NAME' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_DIR"

          if [ ! -f .env ]; then
            echo "현재 런타임 .env가 없어 Adminer 검증을 시작할 수 없습니다."
            exit 1
          fi

          adminer_cookie_jar="$(mktemp)"
          trap 'rm -f "$adminer_cookie_jar"' EXIT

          if [ "$SSING_DEV_DOMAIN" = ":80" ]; then
            adminer_url="http://127.0.0.1/adminer/"
            adminer_resolve=()
          else
            adminer_url="https://${SSING_DEV_DOMAIN}/adminer/"
            adminer_resolve=(--resolve "${SSING_DEV_DOMAIN}:443:127.0.0.1")
          fi

          for attempt in {1..30}; do
            echo "Adminer 자동 로그인 확인 시도: ${attempt}/30"
            : > "$adminer_cookie_jar"

            if adminer_response="$(curl -fsS -L --max-time 10 \
                "${adminer_resolve[@]}" \
                -c "$adminer_cookie_jar" \
                -b "$adminer_cookie_jar" \
                --data-urlencode 'auth[driver]=server' \
                --data-urlencode "auth[server]=${SSING_ADMINER_DEFAULT_SERVER}" \
                --data-urlencode "auth[username]=${SSING_DATASOURCE_USERNAME}" \
                --data-urlencode 'auth[password]=ssing-managed-login' \
                --data-urlencode "auth[db]=${SSING_DEV_DB_NAME}" \
                "$adminer_url")" \
                && grep -q 'name="logout"' <<< "$adminer_response"; then
              echo "Adminer 자동 로그인 확인 성공"
              exit 0
            fi

            sleep 5
          done

          echo "Adminer 자동 로그인 확인 실패: Adminer와 Caddy 컨테이너 최근 로그"
          sudo env SSING_RUNTIME_ENV_FILE=.env \
            docker compose --env-file .env -f "$COMPOSE_FILE" logs --tail=100 adminer caddy
          exit 1
          EOF
          then
            echo "::error title=Adminer 자동 로그인 검증 실패::앱 런타임 설정은 이미 승격되었습니다. /adminer/ 경로, Caddy, DB 접속, 자동 로그인 플러그인 로그를 확인한 뒤 workflow를 다시 실행하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=Adminer 자동 로그인 검증 완료::/adminer/에서 로그인 화면 없이 DB 목록까지 진입했습니다."
          echo "::endgroup::"

      # 두 route smoke 결과를 한곳에서 판정해 후보를 확정하거나 이전 Caddy 설정으로 복구
      - name: Caddy 설정 확정 또는 복구
        if: always()
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
          SSING_DEV_DOMAIN: ${{ vars.SSING_DEV_DOMAIN }}
          CADDY_APP_HEALTH_OUTCOME: ${{ steps.caddy_app_health.outcome }}
          ADMINER_SMOKE_OUTCOME: ${{ steps.adminer_smoke.outcome }}
        run: |
          set -euo pipefail

          if [ ! -f ~/.ssh/ssing-dev-key ]; then
            echo "::notice title=Caddy 설정 정리 생략::SSH 준비 전에 배포가 끝나 원격 Caddy transaction이 없습니다."
            exit 0
          fi

          if [ "$CADDY_APP_HEALTH_OUTCOME" = "success" ] \
              && [ "$ADMINER_SMOKE_OUTCOME" = "success" ]; then
            caddy_smoke_succeeded="true"
            action_message="두 smoke가 통과해 새 Caddy 설정을 확정합니다."
          else
            caddy_smoke_succeeded="false"
            action_message="Caddy 관련 smoke가 모두 통과하지 않아 이전 설정을 복구합니다."
          fi

          echo "::group::Caddy 설정 확정 또는 복구"
          echo "$action_message"
          SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"

          if ! ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
            "DEPLOY_DIR='$DEPLOY_DIR' COMPOSE_FILE='$COMPOSE_FILE' DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_RUN_ID='$GITHUB_RUN_ID' DEPLOY_RUN_ATTEMPT='$GITHUB_RUN_ATTEMPT' SSING_DEV_DOMAIN='$SSING_DEV_DOMAIN' CADDY_SMOKE_SUCCEEDED='$caddy_smoke_succeeded' bash -s" <<'EOF'
          set -euo pipefail
          if [ ! -x "$DEPLOY_DIR/.manage-dev-caddy.sh" ]; then
            if [ -e "$DEPLOY_DIR/.dev-deploy-caddy-activated" ]; then
              echo "미완료 Caddy transaction이 있지만 설정 관리기를 실행할 수 없습니다."
              exit 1
            fi
            echo "실행할 Caddy transaction이 없습니다."
            exit 0
          fi
          "$DEPLOY_DIR/.manage-dev-caddy.sh" settle
          EOF
          then
            echo "::error title=Caddy 설정 확정·복구 실패::원격 Caddy transaction marker와 rollback 파일을 보존했습니다. 다음 배포 전에 로그를 확인하세요."
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice title=Caddy 설정 확정·복구 완료::${action_message}"
          echo "::endgroup::"

      # dev 배포 성공 Slack 알림
      - name: Slack 배포 성공 알림
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            attachments:
              - color: "good"
                fallback: "✅ SSING dev 배포 성공"
                title: "✅ SSING dev 배포 성공"
                title_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                fields:
                  - title: "실행자"
                    value: "${{ github.actor }}"
                    short: true
                  - title: "커밋"
                    value: "<${{ github.server_url }}/${{ github.repository }}/commit/${{ env.DEPLOY_SHA }}|커밋 보기>"
                    short: true
                  - title: "배포 결과"
                    value: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions에서 보기>"
                mrkdwn_in:
                  - fields

      # dev 배포 실패 Slack 알림
      - name: Slack 배포 실패 알림
        if: failure() || cancelled()
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            attachments:
              - color: "danger"
                fallback: "❌ SSING dev 배포 실패"
                title: "❌ SSING dev 배포 실패"
                title_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                fields:
                  - title: "실행자"
                    value: "${{ github.actor }}"
                    short: true
                  - title: "커밋"
                    value: "<${{ github.server_url }}/${{ github.repository }}/commit/${{ env.DEPLOY_SHA }}|커밋 보기>"
                    short: true
                  - title: "실패 원인"
                    value: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions에서 확인>"
                mrkdwn_in:
                  - fields

      # 배포 결과 요약
      - name: 배포 결과 요약
        if: always()
        run: |
          {
            echo "## Dev 배포 결과"
            echo ""
            echo "- 상태: \`${{ job.status }}\`"
            echo "- 브랜치: \`${{ github.ref_name }}\`"
            echo "- 커밋: \`${{ env.DEPLOY_SHA }}\`"
            echo "- 배포 경로: \`$DEPLOY_DIR\`"
            echo ""
            echo "실패한 경우 GitHub Actions 화면에서 자동으로 펼쳐진 실패 step을 먼저 확인하세요."
            echo "각 실패 step의 \`::error\` 메시지에 확인해야 할 설정과 로그 위치를 적어두었습니다."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 배포 임시 비밀 파일 정리
        if: always()
        continue-on-error: true
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USERNAME: ${{ vars.EC2_USERNAME }}
          SSING_DEV_DOMAIN: ${{ vars.SSING_DEV_DOMAIN }}
        run: |
          rm -f .migration.env .deploy-db-tooling.tgz .deploy-adminer.tgz
          if [ -f ~/.ssh/ssing-dev-key ]; then
            SSH_TARGET="${EC2_USERNAME}@${EC2_HOST}"
            ssh -i ~/.ssh/ssing-dev-key "$SSH_TARGET" \
              "DEPLOY_DIR='$DEPLOY_DIR' COMPOSE_FILE='$COMPOSE_FILE' DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_RUN_ID='$GITHUB_RUN_ID' DEPLOY_RUN_ATTEMPT='$GITHUB_RUN_ATTEMPT' SSING_DEV_DOMAIN='$SSING_DEV_DOMAIN' bash -s" <<'EOF' || true
          set -euo pipefail
          rm -f \
            "$DEPLOY_DIR/.migration.env" \
            "$DEPLOY_DIR/.deploy-db-tooling.tgz" \
            "$DEPLOY_DIR/.deploy-adminer.tgz" \
            "$DEPLOY_DIR/.install-dev-release.sh" \
            "$DEPLOY_DIR/.dev-deploy-preflight" \
            "$DEPLOY_DIR/.dev-deploy-compose-started.tmp" \
            "$DEPLOY_DIR/secrets/firebase-admin.json.next" \
            "$DEPLOY_DIR/secrets/adminer-db-password.next"

          if [ -x "$DEPLOY_DIR/.manage-dev-caddy.sh" ]; then
            "$DEPLOY_DIR/.manage-dev-caddy.sh" cleanup
          elif [ -e "$DEPLOY_DIR/.dev-deploy-caddy-activated" ]; then
            echo "미완료 Caddy transaction이 있어 후보와 rollback 파일을 보존합니다."
          else
            rm -f \
              "$DEPLOY_DIR/Caddyfile.candidate-${DEPLOY_SHA}-${DEPLOY_RUN_ID}-${DEPLOY_RUN_ATTEMPT}" \
              "$DEPLOY_DIR/Caddyfile.rollback-${DEPLOY_SHA}-${DEPLOY_RUN_ID}-${DEPLOY_RUN_ATTEMPT}" \
              "$DEPLOY_DIR/Caddyfile.rollback-domain-${DEPLOY_SHA}-${DEPLOY_RUN_ID}-${DEPLOY_RUN_ATTEMPT}"
          fi

          rm -f "$DEPLOY_DIR/.env.next"
          if [ -e "$DEPLOY_DIR/.dev-deploy-compose-started" ]; then
            active_candidate="$(< "$DEPLOY_DIR/.dev-deploy-compose-started")"
            if [[ ! "$active_candidate" =~ ^\.env\.candidate-[0-9a-f]{40}-[0-9]+-[0-9]+$ ]]; then
              echo "후보 Compose marker 형식이 올바르지 않아 후보 설정을 임의로 정리하지 않습니다."
              exit 1
            fi
            if [ ! -f "$DEPLOY_DIR/$active_candidate" ]; then
              echo "marker가 가리키는 SHA 고정 후보 설정이 없어 원격 상태를 확정할 수 없습니다."
              exit 1
            fi
            echo "후보 Compose가 시작되어 실행 중일 수 있는 SHA 고정 후보 설정을 보존합니다: $active_candidate"
          fi
          EOF
          fi
          rm -f ~/.ssh/ssing-dev-key
