name: DB Seed Check

on:
  workflow_dispatch:
  schedule:
    - cron: "40 18 * * *"

concurrency:
  group: db-seed-check
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migration-and-seed:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 내부 reset 직접 실행 차단 검증
        run: |
          set +e
          output=$(./scripts/db/reset-core.sh local matching-price-vivaldi 2>&1)
          exit_code=$?
          set -e

          test "$exit_code" -eq 2
          grep -q -- "--confirm-local-reset" <<< "$output"

      - name: 전체 reset 추가 인자 차단 검증
        run: |
          set +e
          output=$(./scripts/db/reset-all-local.sh --confirm-local-reset unexpected-argument 2>&1)
          exit_code=$?
          set -e

          test "$exit_code" -eq 2
          grep -q -- "Usage:" <<< "$output"

      - name: 모든 seed scenario local reset 검증
        env:
          SSING_LOCAL_DB_ROOT_PASSWORD: 'local seed #42;"quoted"=value'
        run: ./scripts/db/reset-all-local.sh --confirm-local-reset

      - name: CI MySQL 정리
        if: always()
        run: docker compose --file docker-compose.local.yml down --volumes
