name: CI/CD

# PR 검증과 main 반영 후 재검증 트리거
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# 같은 PR의 이전 실행만 취소하고 main 검증은 모두 보존
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 검증과 image build에 필요한 저장소 읽기 권한만 사용
permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.name }}
    # EC2 t4g 계열과 동일한 ARM64 검증 환경
    runs-on: ubuntu-24.04-arm

    # 통합 테스트를 정확히 두 Runner에서 상호 보완적으로 실행
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        include:
          - name: 애플리케이션·통합 테스트
            shard: application
            gradle-tasks: build
          - name: DB·Seed 테스트
            shard: seed-migration
            gradle-tasks: integrationTest

    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Java 21 실행 환경 준비
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle 캐시와 실행 환경 준비
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle Wrapper 실행 권한 부여
        run: chmod +x gradlew

      # 별도 Runner를 추가하지 않고 애플리케이션 Runner에서 수 초짜리 계약 검증 실행
      - name: DB 실행기 빠른 계약 검증
        if: matrix.shard == 'application'
        run: |
          set -euo pipefail

          bash -n scripts/db/*.sh
          bash scripts/db/test-mysql-client-auth.sh
          bash scripts/db/test-install-dev-release.sh
          bash scripts/db/test-dev-runner-contract.sh
          python3 scripts/db/test_dev_workflow_contract.py

      - name: ${{ matrix.name }} 실행
        run: |
          set -euo pipefail

          echo "실행 shard: ${{ matrix.shard }}"
          echo "실행 task: ${{ matrix.gradle-tasks }}"
          ./gradlew ${{ matrix.gradle-tasks }} \
            -PintegrationTestShard=${{ matrix.shard }}

  # main에서만 두 테스트와 독립적으로 ARM64 이미지를 미리 만든다.
  build-dev-image:
    name: Dev ARM64 이미지 빌드
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: dev
      deployment: false
    runs-on: ubuntu-24.04-arm
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Docker Hub 설정 확인
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          for variable_name in DOCKERHUB_IMAGE DOCKERHUB_USERNAME DOCKERHUB_TOKEN; do
            if [ -z "${!variable_name}" ]; then
              echo "::error title=Docker Hub 설정 누락::${variable_name} 값이 없습니다."
              exit 1
            fi
          done

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Buildx 준비
        uses: docker/setup-buildx-action@v3

      - name: ARM64 Docker 이미지 빌드와 푸시
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ vars.DOCKERHUB_IMAGE }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  deploy-dev:
    name: Dev 배포
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify
      - build-dev-image
    uses: ./.github/workflows/deploy-dev.yml
    with:
      deploy_sha: ${{ github.sha }}
      image_digest: ${{ needs.build-dev-image.outputs.image_digest }}
    secrets: inherit
