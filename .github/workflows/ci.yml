name: CI

# PR 검증과 main 반영 후 재검증 트리거
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# 같은 PR의 이전 실행만 취소하고 main 검증은 모두 보존
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 테스트 결과를 GitHub Check로 게시하는 최소 권한
permissions:
  contents: read
  checks: write

jobs:
  verify:
    name: ${{ matrix.name }}
    # EC2 t4g 계열과 동일한 ARM64 검증 환경
    runs-on: ubuntu-24.04-arm

    # 통합 테스트를 정확히 두 Runner에서 상호 보완적으로 실행
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        include:
          - name: 애플리케이션·단위 테스트
            shard: application
            gradle-tasks: build
          - name: Seed·Migration 테스트
            shard: seed-migration
            gradle-tasks: integrationTest

    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Java 21 실행 환경 준비
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle 캐시와 실행 환경 준비
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle Wrapper 실행 권한 부여
        run: chmod +x gradlew

      # 별도 Runner를 추가하지 않고 애플리케이션 Runner에서 수 초짜리 계약 검증 실행
      - name: DB 실행기 빠른 계약 검증
        if: matrix.shard == 'application'
        run: |
          set -euo pipefail

          bash -n scripts/db/*.sh
          bash scripts/db/test-mysql-client-auth.sh
          bash scripts/db/test-dev-runner-contract.sh
          python3 scripts/db/test_dev_workflow_contract.py

      - name: ${{ matrix.name }} 실행
        run: |
          set -euo pipefail

          echo "실행 shard: ${{ matrix.shard }}"
          echo "실행 task: ${{ matrix.gradle-tasks }}"
          ./gradlew ${{ matrix.gradle-tasks }} \
            -PintegrationTestShard=${{ matrix.shard }}

      - name: ${{ matrix.name }} 결과 게시
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled())
        with:
          check_name: ${{ matrix.name }} 결과
          comment_mode: off
          files: build/test-results/**/TEST-*.xml

  deploy-dev:
    name: Dev 배포
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    uses: ./.github/workflows/deploy-dev.yml
    with:
      deploy_sha: ${{ github.sha }}
    secrets: inherit
