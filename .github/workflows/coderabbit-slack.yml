name: CodeRabbit Slack Alert

# CodeRabbit commit status가 성공으로 바뀌면 PR 리뷰 완료를 Slack에 알립니다.
on:
  status:

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-coderabbit-review:
    name: Slack CodeRabbit review alert
    if: github.event.context == 'CodeRabbit' && github.event.state == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: PR 정보와 Slack payload 생성
        id: slack-payload
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const { owner, repo } = context.repo;
            const sha = context.payload.sha;
            const serverUrl = process.env.GITHUB_SERVER_URL || 'https://github.com';

            const { data: pullRequests } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: sha,
              });

            const pullRequest = pullRequests.find((pr) => pr.state === 'open');

            if (!pullRequest) {
              core.notice(`No open pull request found for CodeRabbit status commit ${sha}.`);
              core.setOutput('has_pull_request', 'false');
              return;
            }

            const shortSha = sha.slice(0, 7);
            const commitUrl = `${serverUrl}/${owner}/${repo}/commit/${sha}`;
            const reviewUrl = context.payload.target_url || pullRequest.html_url;
            const statusDescription =
              context.payload.description || 'CodeRabbit review completed.';

            const payload = {
              attachments: [
                {
                  color: 'good',
                  fallback: `CodeRabbit 리뷰 완료: #${pullRequest.number} ${pullRequest.title}`,
                  title: `CodeRabbit 리뷰 완료: #${pullRequest.number}`,
                  title_link: reviewUrl,
                  fields: [
                    {
                      title: 'PR',
                      value: `<${pullRequest.html_url}|#${pullRequest.number} ${pullRequest.title}>`,
                      short: false,
                    },
                    {
                      title: '작성자',
                      value: pullRequest.user?.login || 'unknown',
                      short: true,
                    },
                    {
                      title: '커밋',
                      value: `<${commitUrl}|${shortSha}>`,
                      short: true,
                    },
                    {
                      title: '상태',
                      value: statusDescription,
                      short: false,
                    },
                  ],
                  mrkdwn_in: ['fields'],
                },
              ],
            };

            fs.writeFileSync('slack-payload.json', JSON.stringify(payload));
            core.setOutput('has_pull_request', 'true');

      - name: Slack CodeRabbit 리뷰 완료 알림
        if: steps.slack-payload.outputs.has_pull_request == 'true'
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: slack-payload.json
