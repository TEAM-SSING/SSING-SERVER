name: CodeRabbit Slack Payload

# CodeRabbit commit status가 성공으로 바뀌면 Slack 전송용 payload를 만듭니다.
# Slack secret은 bot-triggered status workflow에서 직접 사용하지 않습니다.
on:
  status:

permissions:
  contents: read
  pull-requests: read

jobs:
  build-coderabbit-slack-payload:
    name: Build CodeRabbit Slack payload
    if: github.event.context == 'CodeRabbit' && github.event.state == 'success' && github.event.description == 'Review completed'
    runs-on: ubuntu-latest

    steps:
      - name: PR 정보와 Slack payload 생성
        id: slack-payload
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const { owner, repo } = context.repo;
            const sha = context.payload.sha;
            const serverUrl = process.env.GITHUB_SERVER_URL || 'https://github.com';
            const payloadDirectory = 'coderabbit-slack-payload';
            const payloadPath = `${payloadDirectory}/slack-payload.json`;

            fs.mkdirSync(payloadDirectory, { recursive: true });

            const { data: pullRequests } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: sha,
              });

            const pullRequest = pullRequests.find((pr) => pr.state === 'open');

            if (!pullRequest) {
              core.notice(`No open pull request found for CodeRabbit status commit ${sha}.`);
              fs.writeFileSync(
                payloadPath,
                JSON.stringify(
                  {
                    should_notify: false,
                    reason: `No open pull request found for CodeRabbit status commit ${sha}.`,
                  },
                  null,
                  2,
                ),
              );
              return;
            }

            const shortSha = sha.slice(0, 7);
            const commitUrl = `${serverUrl}/${owner}/${repo}/commit/${sha}`;
            const reviewUrl = context.payload.target_url || pullRequest.html_url;
            const statusDescription =
              context.payload.description || 'CodeRabbit review completed.';

            const payload = {
              attachments: [
                {
                  color: 'good',
                  fallback: `CodeRabbit 리뷰 완료: #${pullRequest.number} ${pullRequest.title}`,
                  title: `CodeRabbit 리뷰 완료: #${pullRequest.number}`,
                  title_link: reviewUrl,
                  fields: [
                    {
                      title: 'PR',
                      value: `<${pullRequest.html_url}|#${pullRequest.number} ${pullRequest.title}>`,
                      short: false,
                    },
                    {
                      title: '작성자',
                      value: pullRequest.user?.login || 'unknown',
                      short: true,
                    },
                    {
                      title: '커밋',
                      value: `<${commitUrl}|${shortSha}>`,
                      short: true,
                    },
                    {
                      title: '상태',
                      value: statusDescription,
                      short: false,
                    },
                  ],
                  mrkdwn_in: ['fields'],
                },
              ],
            };

            fs.writeFileSync(
              payloadPath,
              JSON.stringify(
                {
                  should_notify: true,
                  payload,
                },
                null,
                2,
              ),
            );

      - name: Slack payload artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: coderabbit-slack-payload
          path: coderabbit-slack-payload/slack-payload.json
          retention-days: 1
